    if (!id || !field) continue;
    m = findRosterMember(id);
    if (!m) continue;
    val = t.value;
    if (field === "name") {
      var nn = (val || "").trim();
      if (nn) m.name = nn;
    } else if (field === "sposuruName") m.sposuruName = val || "";
    else if (field === "enrolledAt") m.enrolledAt = val || "";
    else if (field === "attendanceCount") setMemberAttendanceCount(m, val);
    else if (field === "stripes") {
      n = parseInt(val, 10);
      if (isNaN(n) || n < 0) n = 0;
      if (n > STRIPE_MAX) n = STRIPE_MAX;
      m.stripes = n;
    } else if (field === "birthMd") m.birthMd = normalizeBirthMd(val);
    else if (field === "memberComment") {
      m.memberComment = val || "";
      touchMemberCommentMeta(m);
    } else if (field === "personalGoal") {
      m.personalGoal = val || "";
      m.personalGoalPeriodKey = getCurrentPeriodKey();
    }
  }
}

async function applySposuruCsvText(text, silent, options) {
  if (isMemberMode || isReadonly()) return null;
  options = options || {};
  flushRosterInputsFromDom();
  var cutoffDate = options.importCutoffDate !== undefined ? options.importCutoffDate : getTodayDateStr();
  var parsed = parseSposuruCsv(text, { importCutoffDate: cutoffDate });
  if (!parsed.sessions.length && !parsed.rows.length) {
    var emptyMsg = "取込できる行がありません（CSVの列名・文字コード・対象グループを確認）";
    if (parsed.stats.futureOnly && parsed.stats.earliestDate) {
      emptyMsg = "基準日（" + cutoffDate + "）以前の出席が0件です。最短の予定日は " + parsed.stats.earliestDate + " です。クラス実施後に再取込してください。";
    }
    setSposuruImportAlert(emptyMsg, "error");
    ensureSposuruSettings().lastSyncSummary = emptyMsg;
    ensureSposuruSettings().lastImportCutoffDate = cutoffDate;
    saveLocal();
    if (!silent) showToast(emptyMsg, { persistent: true, type: "error" });
    render();
    return null;
  }
  var cfg = ensureSposuruSettings();
  var baselines = cfg.importBaselines;
  var importedSessions = cfg.importedSessions;
  var updated = 0, created = 0, skippedDup = 0, addedSessions = 0, matchedNoData = [], changed = false;
  var touched = {};

  function touchMember(found, sessOrRow) {
    var m = found.member;
    if (found.created) { created++; changed = true; }
    if (sessOrRow.group && sessOrRow.group !== m.group) {
      m.group = sessOrRow.group;
      m.track = inferMemberTrack(m.group, m.track);
      changed = true;
    }
    return m;
  }

  if (parsed.format === "session") {
    parsed.sessions.forEach(function(sess) {
      if (importedSessions[sess.sessionKey]) { skippedDup++; return; }
      var found = findOrCreateRosterForSposuruName(sess.name, sess.group);
      var m = touchMember(found, sess);
      if (isSposuruAttendanceGroup(sess.group)) {
        adjustMemberAttendance(m, 1);
        addedSessions++;
      }
      importedSessions[sess.sessionKey] = 1;
      touched[m.id] = true;
      changed = true;
    });
    updated = Object.keys(touched).length;
  } else {
    parsed.rows.forEach(function(row) {
      var found = findOrCreateRosterForSposuruName(row.name, row.group);
      var m = touchMember(found, row);
      var rowChanged = !!found.created;
      if (row.attendance != null && isSposuruAttendanceGroup(row.group)) {
        var key = sposuruBaselineKey(row.name);
        var prev = baselines[key] || 0;
        var csvCount = row.attendance;
        if (csvCount > prev) {
          var delta = csvCount - prev;
          adjustMemberAttendance(m, delta);
          baselines[key] = csvCount;
          addedSessions += delta;
          rowChanged = true;
        } else if (csvCount === prev && prev > 0) {
          skippedDup++;
        } else if (csvCount < prev) {
          baselines[key] = prev;
        } else {
          baselines[key] = csvCount;
        }
      }
      if (rowChanged) { updated++; touched[m.id] = true; changed = true; }
      else matchedNoData.push(row.name);
    });
  }

  cfg.lastSyncAt = Date.now();
  cfg.lastImportCutoffDate = cutoffDate;
  cfg.importBaselines = baselines;
  cfg.importedSessions = importedSessions;
  var parts = [];
  if (updated > 0) parts.push(updated + "名更新（+" + addedSessions + "回）");
  if (created > 0) parts.push("新規" + created + "名");
  if (skippedDup > 0) parts.push("重複スキップ" + skippedDup + (parsed.format === "session" ? "件" : "名"));
  parts.push("基準日 " + cutoffDate);
  var summary = "";
  if (updated > 0 || created > 0) {
    summary = parts.join(" ／ ");
    setSposuruImportAlert(summary, "ok");
  } else if (skippedDup > 0) {
    summary = "変更なし（前回取込分と重複） ／ 基準日 " + cutoffDate;
    setSposuruImportAlert(summary, "warn");
  } else if (matchedNoData.length) {
    summary = "照合OKだが出席数なし ／ 基準日 " + cutoffDate;
    setSposuruImportAlert(summary, "warn");
  } else {
    summary = "変更なし ／ 基準日 " + cutoffDate;
    setSposuruImportAlert(summary, "warn");
  }
  cfg.lastSyncSummary = summary;
  if (changed) saveState();
  else saveLocal();
  if (!silent) {
    if (updated > 0 || created > 0) showToast("スポスル出席を取込しました（" + summary + "）", { type: "ok", duration: 3500 });
    else showToast(summary, { persistent: true, type: skippedDup > 0 ? "warn" : "error" });
  }
  render();
  return { updated: updated, created: created, addedSessions: addedSessions, skippedDup: skippedDup };
}

function isSposuruCsvFile(file) {
  if (!file) return false;
  var name = (file.name || "").toLowerCase();
  if (/\.(csv|txt)$/.test(name)) return true;
  var type = (file.type || "").toLowerCase();
  return type.indexOf("csv") >= 0 || type.indexOf("text") >= 0 || type === "application/vnd.ms-excel";
}

function readSposuruFileAsText(file, callback) {
  file.arrayBuffer().then(function(buf) {
    var utf8 = new TextDecoder("utf-8").decode(buf);
    if (/[\uFFFD]/.test(utf8) || (utf8.indexOf("氏") < 0 && utf8.indexOf(",") >= 0 && /[\x80-\xff]/.test(utf8))) {
      try {
        callback(new TextDecoder("shift_jis").decode(buf));
        return;
      } catch (e) {}
    }
    callback(utf8);
  }).catch(function() {
    var reader = new FileReader();
    reader.onload = function(ev) { callback(ev.target && ev.target.result != null ? String(ev.target.result) : ""); };
    reader.onerror = function() { showToast("ファイルの読込に失敗しました"); };
    reader.readAsText(file, "UTF-8");
  });
}

function handleSposuruFiles(fileList) {
  if (isMemberMode || isReadonly()) return;
  if (!fileList || !fileList.length) return;
  var file = fileList[0];
  if (!isSposuruCsvFile(file)) {
    showToast("CSVファイル（.csv）をドロップしてください");
    return;
  }
  readSposuruFileAsText(file, function(text) {
    if (!text.trim()) { showToast("ファイルが空です"); return; }
    applySposuruCsvText(text, false, { filename: file.name });
    var ta = document.getElementById("sposuruPasteArea");
    if (ta) ta.value = text.length > 4000 ? text.slice(0, 4000) + "\n…" : text;
  });
}

function bindSposuruDropzone() {
  var dz = document.getElementById("sposuruDropzone");
  var input = document.getElementById("sposuruFileInput");
  if (!dz || dz.dataset.bound === "1") return;
  dz.dataset.bound = "1";

  dz.addEventListener("dragenter", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.add("drag-over");
  });
  dz.addEventListener("dragover", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.add("drag-over");
  });
  dz.addEventListener("dragleave", function(e) {
    e.preventDefault();
    e.stopPropagation();
    if (e.currentTarget === dz && !dz.contains(e.relatedTarget)) dz.classList.remove("drag-over");
  });
  dz.addEventListener("drop", function(e) {
    e.preventDefault();
    e.stopPropagation();
    dz.classList.remove("drag-over");
    if (e.dataTransfer && e.dataTransfer.files) handleSposuruFiles(e.dataTransfer.files);
  });
  dz.addEventListener("click", function(e) {
    if (e.target.closest("button")) return;
    if (input) input.click();
  });
  dz.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      if (input) input.click();
    }
  });
  if (input) {
    input.addEventListener("change", function() {
      handleSposuruFiles(input.files);
      input.value = "";
    });
  }
}

  for (gi = 0; gi < groups.length; gi++) {
    for (ii = 0; ii < groups[gi].items.length; ii++) {
      var key = groups[gi].key + "-" + ii;
      out[key] = stripeReviewChecks[key] || null;
    }
  }
  return out;

function summarizeStripeChecks(checks) {
  var ok = 0, ng = 0, unset = 0, k;
  for (k in checks) {
    if (!Object.prototype.hasOwnProperty.call(checks, k)) continue;
    if (checks[k] === "ok") ok++;
    else if (checks[k] === "ng") ng++;
    else unset++;
  }
  return { ok: ok, ng: ng, unset: unset };
}

function validateStripeChecksForPass(def, checks, member, targetLevel) {
  var errors = [], groups = member ? getStripeCheckGroupsForMember(def, member, targetLevel) : getStripeCheckGroups(def), gi, ii;
  for (gi = 0; gi < groups.length; gi++) {
    for (ii = 0; ii < groups[gi].items.length; ii++) {
      var key = groups[gi].key + "-" + ii;
      var val = checks[key];
      var label = groups[gi].items[ii].label;
      if (!val) errors.push(groups[gi].label + "「" + label + "」が未判定");
      else if (groups[gi].required && val !== "ok") errors.push(groups[gi].label + "「" + label + "」が×");
    }
  }
  return { ok: errors.length === 0, errors: errors };
}

  } else {
    var levelLabel = (getStripeLevelDef(review.targetLevel) || {}).label || "";
    confirmText = m.name + "さんの審査記録を削除しますか？\n\n" +
      formatConfirmDate(review.at) + " ／ " + review.targetLevel + "本目（" + levelLabel + "） ／ " + formatStripeReviewResultLabel(review.result) +
      (review.result === "pass" ? "\n\n※ 合格記録の削除に伴い、ストライプ本数を再計算します。" : "");
  }
  if (!confirm(confirmText)) return;
  m.reviews = m.reviews.filter(function(r) { return r.id !== reviewId; });
  if (isMessageEntry(review)) {
    var latestMsg = getLatestMessageEntry(m);
    m.memberComment = latestMsg ? (latestMsg.memo || "") : "";
    if (latestMsg) touchMemberCommentMeta(m, true);
  } else {
    recalcMemberStripesFromReviews(m);
  }
  saveState();
  var keepOpen = reviewHistoryMemberId === rosterId;
  render();
  if (keepOpen) {
    var updated = findRosterMember(rosterId);
    if (updated) {
      reviewHistoryMemberId = rosterId;
      renderReviewHistoryModalBody(updated);
      document.getElementById("reviewHistoryModal").classList.add("open");
    } else {
      closeReviewHistoryModal();
    }
  }
  showToast(isMessageEntry(review) ? "指導員メッセージを削除しました ✓" : "審査記録を削除しました ✓");
}

function submitStripeReview(result) {
  if (!stripeReviewMemberId || isMemberMode || isReadonly()) return;
  var m = findRosterMember(stripeReviewMemberId);
  if (!m) return;
  var targetSel = document.getElementById("stripeReviewTarget");
  var targetLevel = targetSel ? parseInt(targetSel.value, 10) : ((m.stripes || 0) + 1);
  var def = getStripeLevelDef(targetLevel);
  if (!def) return;

  var checks = collectStripeReviewChecks(def, m, targetLevel);
  var summary = summarizeStripeChecks(checks);
  var validation = validateStripeChecksForPass(def, checks, m, targetLevel);
  var memoEl = document.getElementById("stripeReviewMemo");
  var memo = memoEl ? memoEl.value.trim() : "";

  if (result === "pass") {
    if (!validation.ok) {
      showToast(validation.errors[0] || "必須項目をすべて○にしてください");
      return;
    }
    if (targetLevel <= (m.stripes || 0)) { showToast("合格は現在の本数より上の審査のみ可能です"); return; }
    if (!confirm(m.name + " にストライプ" + targetLevel + "本目を授与しますか？\n（○" + summary.ok + " / ×" + summary.ng + "）")) return;
    m.stripes = targetLevel;
    syncStripesFromRoster(m.id);
  } else if (result === "hold") {
    if (summary.ok === 0 && summary.ng === 0 && !memo) {
      showToast("○または×、または審査メモを入力してください", { type: "warn" });
      return;
    }
  }

  if (!m.reviews) m.reviews = [];
  var reviewEntry = {
    id: "sr-" + Date.now(),
    at: Date.now(),
    periodKey: getCurrentPeriodKey(),
    kind: "review",
    targetLevel: targetLevel,
    result: result,
    checks: checks,
    checkLabels: buildStripeCheckLabelsSnapshot(def, checks, m, targetLevel),
    checkSummary: summary,
    safetyOk: validation.ok,
    memo: memo
  };
  if (result === "pass") {
    reviewEntry.attendanceAtPass = Math.max(0, m.attendanceCount || 0);
  }
  m.reviews.push(reviewEntry);

  saveState();
  if (result === "hold") {
    renderStripeReviewModal(m, targetLevel);
    render();
    showToast("保留として記録しました（○" + summary.ok + " / ×" + summary.ng + "）", { type: "ok" });
    return;
  }
  closeStripeReview();
  render();
  showToast(result === "pass" ? "ストライプ" + targetLevel + "本を授与 ✓" : "審査結果を記録しました");
}

    stripes: m.stripes || 0,

function parseUrlViewParam() {
  if (isMemberMode) return null;
  var search = window.location.search || "";
  if (search.charAt(0) === "?") search = search.slice(1);
  if (!search) return null;
  var part = search.split("&"), i, kv, params = {};
  for (i = 0; i < part.length; i++) {
    kv = part[i].split("=");
    if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1] || "").replace(/\+/g, " "));
  }
  return params.view || null;
}

function getStripes(p) {
  if (!p) return 0;
  if (p.rosterId) {
    var m = findRosterMember(p.rosterId);
    if (m) return m.stripes || 0;
  }
  if (p.name && state && Array.isArray(state.roster)) {
    for (var i = 0; i < state.roster.length; i++) {
      if (state.roster[i].name === p.name) return state.roster[i].stripes || 0;
    }
  }
  var n = parseInt(p.stripes, 10);
  return isNaN(n) || n < 0 ? 0 : Math.min(n, STRIPE_MAX);
}

function renderStripeVisual(p, compact) {
  var n = getStripes(p);
  if (n <= 0) return "";
  var maxBars = compact ? 4 : 7;
  var show = n < maxBars ? n : maxBars;
  var bars = "";
  var i;
  for (i = 0; i < show; i++) {

function getRecentMatches(league, playerId, limit) {
  limit = limit || 5;
  var keys = Object.keys(league.results);
  var matches = [];
  var i, key, parts, oppId, result, j;
  for (i = 0; i < keys.length; i++) {
    key = keys[i];
    parts = key.split("|");
    if (parts.indexOf(playerId) < 0) continue;
    oppId = parts[0] === playerId ? parts[1] : parts[0];
    result = league.results[key];
    if (!result) continue;
    matches.push({
      opponentId: oppId,
      opponentName: findPlayerName(league, oppId),
      result: result,
      playedAt: result.playedAt || null,
      orderIndex: i,
      leagueName: league.name
    });
  }
  matches.sort(function(a, b) {
    var ta = a.playedAt || 0;
    var tb = b.playedAt || 0;
    if (ta && tb && ta !== tb) return tb - ta;
    if (ta && !tb) return -1;
    if (!ta && tb) return 1;
    return b.orderIndex - a.orderIndex;
  });
  return matches.slice(0, limit);
}

function pointsFor(playerId, result, rule) {
  if (!result) return 0;
  if (result.r === "draw") return rule.draw;
  if (result.w === playerId) return rule[result.r];
  return rule.lose;
}

function cellLabel(playerId, result) {
  if (!result) return "";
  if (result.r === "draw") return "引分";
  const won = result.w === playerId;
  if (result.r === "ippon") return won ? "一本勝" : "一本負";
  return won ? "優勢勝" : "優勢負";
}

function cellSymbol(playerId, result) {
  if (!result) return "";
  if (result.r === "draw") return "△";
  var won = result.w === playerId;
  if (result.r === "ippon") return won ? "◎" : "✕";
  return won ? "○" : "▲";
}

function cellClass(playerId, result) {
  if (!result) return "empty";
  if (result.r === "draw") return "draw";
  const won = result.w === playerId;
  if (result.r === "ippon") return won ? "win-ippon" : "lose-ippon";
  return won ? "win-yusei" : "lose-yusei";
}

function computeStats(league) {
  const rule = getActiveContext().pointRule;
  const players = getActivePlayers(league);
  const stats = {};
  for (const p of players) {
    stats[p.id] = { points: 0, wins: 0, draws: 0, losses: 0, played: 0 };
  }
  for (const p of players) {
    for (const q of players) {
      if (p.id === q.id) continue;
      const r = getResult(league, p.id, q.id);
      if (!r) continue;
      stats[p.id].points += pointsFor(p.id, r, rule);
      stats[p.id].played++;
      if (r.r === "draw") stats[p.id].draws++;
      else if (r.w === p.id) stats[p.id].wins++;
      else stats[p.id].losses++;
    }
  }
  const sorted = players.map(function(p) {
    return Object.assign({}, p, stats[p.id], {
      rank: 1 + players.filter(function(q) {
        return (stats[q.id].played > 0 ? 1 : 0) > (stats[p.id].played > 0 ? 1 : 0) ||
          ((stats[q.id].played > 0) === (stats[p.id].played > 0) && stats[q.id].points > stats[p.id].points);
      }).length
    });
  }).sort(function(a, b) {
    return (a.played === 0 ? 1 : 0) - (b.played === 0 ? 1 : 0) ||
      b.points - a.points ||
      a.name.localeCompare(b.name, "ja");
  });
  return { stats, sorted };
}

function isInCurrentMonth(playedAt) {
  if (!playedAt) return false;
  var d = new Date(playedAt);
  var now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}

function getCurrentMonthLabel() {

}

function getMonthKeyFromTimestamp(ts) {
  var d = new Date(ts);
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
}

function getCurrentMonthKey() {
  return getMonthKeyFromTimestamp(Date.now());
}

function formatMonthKeyLabel(monthKey) {
  var parts = (monthKey || "").split("-");
  if (parts.length < 2) return monthKey || "";
  return parts[0] + "年" + parseInt(parts[1], 10) + "月";
}

function isInMonthKey(playedAt, monthKey) {
  if (!playedAt || !monthKey) return false;
  return getMonthKeyFromTimestamp(playedAt) === monthKey;
}

function collectLeagueMonthKeys(league) {
  var set = {};
  var keys = Object.keys(league.results || {});
  var i;
  for (i = 0; i < keys.length; i++) {
    var result = league.results[keys[i]];
    if (!result || !result.playedAt) continue;
    set[getMonthKeyFromTimestamp(result.playedAt)] = true;
  }
  var locked = getMonthlyMvpLockedMap(league.id);
  Object.keys(locked).forEach(function(mk) { set[mk] = true; });
  return Object.keys(set).sort();
}

function computeMonthlyMvpForMonthKey(league, monthKey) {
  var monthStats = computePlayerDetailedStats(league, function(result) {
    return isInMonthKey(result.playedAt, monthKey);
  });
  return pickAwardWinners(monthStats, function(p) { return p.points; }, {
    minValue: 0, minPlayed: MVP_MONTHLY_MIN_GAMES
  });
}

      return { playerId: p.id, points: p.points, played: p.played };
    }),
    tie: computed.tie,

  };
}

function autoLockPastMonthlyMvp() {
  if (isReadonly() || isMemberMode) return;
  if (awardsPageCtx && awardsPageCtx.readonly) return;
  var changed = false;
  var nowKey = getCurrentMonthKey();
  if (!state.monthlyMvpLocked) state.monthlyMvpLocked = {};
  state.leagues.forEach(function(league) {
    if (!state.monthlyMvpLocked[league.id]) state.monthlyMvpLocked[league.id] = {};
    var months = collectLeagueMonthKeys(league);
    var mi;
    for (mi = 0; mi < months.length; mi++) {
      var mk = months[mi];
      if (mk >= nowKey) continue;
      if (state.monthlyMvpLocked[league.id][mk]) continue;
      state.monthlyMvpLocked[league.id][mk] = buildLockedMonthlyEntry(mk, computeMonthlyMvpForMonthKey(league, mk));
      changed = true;
    }
  });
  if (changed) saveState();
}

function lockMonthlyMvpForLeague(leagueId, monthKey) {
  if (isMemberMode || isReadonly()) return;
  var league = getLeague(leagueId);
  if (!league) return;
  monthKey = monthKey || getCurrentMonthKey();
  if (!state.monthlyMvpLocked) state.monthlyMvpLocked = {};
  if (!state.monthlyMvpLocked[leagueId]) state.monthlyMvpLocked[leagueId] = {};
  if (state.monthlyMvpLocked[leagueId][monthKey]) {
    showToast(formatMonthKeyLabel(monthKey) + " は確定済みです");

  if (!confirm(formatMonthKeyLabel(monthKey) + " の月間MVPを確定して記録しますか？")) return;
  state.monthlyMvpLocked[leagueId][monthKey] = buildLockedMonthlyEntry(monthKey, computeMonthlyMvpForMonthKey(league, monthKey));

function getSeasonMvpMinGames(activeCount) {
  var totalRequired = Math.max(0, activeCount - 1);
  return Math.max(2, Math.floor(totalRequired * MVP_SEASON_MIN_RATE));
}

function computePlayerDetailedStats(league, resultFilter) {
  var rule = getActiveContext().pointRule;
  var players = getActivePlayers(league);
  var stats = {};
  players.forEach(function(p) {
    stats[p.id] = {
      id: p.id, name: p.name, active: p.active, stripes: getStripes(p),
      points: 0, played: 0, wins: 0, draws: 0, losses: 0,
      ipponWins: 0, yuseiWins: 0
    };
  });
  var keys = Object.keys(league.results || {});
  var i, key, result, parts, pi, pid;
  for (i = 0; i < keys.length; i++) {
    key = keys[i];
    result = league.results[key];
    if (!result) continue;
    if (resultFilter && !resultFilter(result)) continue;
    parts = key.split("|");
    for (pi = 0; pi < parts.length; pi++) {
      pid = parts[pi];
      if (!stats[pid]) continue;
      stats[pid].played++;
      stats[pid].points += pointsFor(pid, result, rule);
      if (result.r === "draw") stats[pid].draws++;
      else if (result.w === pid) {
        stats[pid].wins++;
        if (result.r === "ippon") stats[pid].ipponWins++;
        else if (result.r === "yusei") stats[pid].yuseiWins++;
      } else stats[pid].losses++;
    }
  }
  return players.map(function(p) { return stats[p.id]; });
}

function pickAwardWinners(playerStats, getValue, opts) {
  opts = opts || {};
  var minValue = opts.minValue != null ? opts.minValue : 1;
  var minPlayed = opts.minPlayed || 0;
  var eligible = playerStats.filter(function(p) {
    if (p.active === false) return false;
    if ((p.played || 0) < minPlayed) return false;
    return getValue(p) >= minValue;
  });
  if (!eligible.length) return { winners: [], value: 0, tie: false };
  eligible.sort(function(a, b) {
    var diff = getValue(b) - getValue(a);
    if (diff !== 0) return diff;
    if (b.points !== a.points) return b.points - a.points;
    return a.name.localeCompare(b.name, "ja");
  });
  var topVal = getValue(eligible[0]);
  var winners = eligible.filter(function(p) { return getValue(p) === topVal; });
  return { winners: winners, value: topVal, tie: winners.length > 1 };
}

function computeLeagueAwards(league) {
  var activeCount = getActivePlayers(league).length;
  var seasonMin = getSeasonMvpMinGames(activeCount);
  var seasonStats = computePlayerDetailedStats(league, null);
  var monthStats = computePlayerDetailedStats(league, function(result) {
    return isInCurrentMonth(result.playedAt);
  });
  var seasonMvp = pickAwardWinners(seasonStats, function(p) { return p.points; }, {
    minValue: 0, minPlayed: seasonMin
  });
  var monthlyMvp = pickAwardWinners(monthStats, function(p) { return p.points; }, {
    minValue: 0, minPlayed: MVP_MONTHLY_MIN_GAMES
  });
  var departments = [
    { key: "ippon", icon: "💥", label: "一本王",
      pick: pickAwardWinners(seasonStats, function(p) { return p.ipponWins; }, { minValue: 1, minPlayed: 1 }),
      detail: function(p) { return "一本勝ち " + p.ipponWins + "回"; } },
    { key: "effort", icon: "🔥", label: "努力賞",
      pick: pickAwardWinners(seasonStats, function(p) { return p.played; }, { minValue: 2, minPlayed: 2 }),
      detail: function(p) { return p.played + "試合消化"; } }
  ];
  return {
    seasonMin: seasonMin,
    seasonMvp: seasonMvp,
    monthlyMvp: monthlyMvp,
    departments: departments,
    monthLabel: getCurrentMonthLabel()
  };
}

  if (!state.playoffs.j1_j2.results) state.playoffs.j1_j2.results = {};
}

function findPlayerGlobal(id) {
  var leagues = getActiveContext().leagues || [];
  for (var i = 0; i < leagues.length; i++) {
    var league = leagues[i];
    for (var j = 0; j < league.players.length; j++) {
      if (league.players[j].id === id) return league.players[j];
    }
  }
  return { id: id, name: "?", active: true };
}

function getPlayoffResult(bucket, idA, idB) {
  return bucket.results[pairKey(idA, idB)] || null;
}

function setPlayoffResult(bucket, idA, idB, result) {
  var key = pairKey(idA, idB);
  if (!result) delete bucket.results[key];
  else bucket.results[key] = result;
}

function makePlayoffLeague(name, playerObjs, results) {
  var players = playerObjs.map(function(p) {
    return { id: p.id, name: p.name, active: true, stripes: getStripes(p) };
  });
  return { id: "playoff", name: name, players: players, results: results };
}

function getPrePlayoffParticipants() {
  var pre = getLeague("pre");
  if (!pre) return [];
  var sorted = computeStats(pre).sorted.filter(function(p) { return p.active !== false && p.played > 0; });
  var tied7 = sorted.filter(function(p) { return p.rank === J1_CUTOFF; });
  return tied7.length > 1 ? tied7 : [];
}

function getJ1J2PlayoffParticipants() {
  var j1 = getLeague("j1");
  var j2 = getLeague("j2");
  if (!j1 || !j2) return [];
  var j1s = computeStats(j1).sorted.filter(function(p) { return p.active !== false && p.played > 0; });
  var j2s = computeStats(j2).sorted.filter(function(p) { return p.active !== false && p.played > 0; });
  if (j1s.length < 2 || j2s.length < 2) return [];
  var j1bottom = j1s.slice(Math.max(0, j1s.length - 2));
  var j2top = j2s.slice(0, 2);
  return j1bottom.map(function(p) { return Object.assign({}, p, { playoffSide: "J1下位" }); })
    .concat(j2top.map(function(p) { return Object.assign({}, p, { playoffSide: "J2上位" }); }));
}

var toastTimer = null;

function hideToast() {
  var t = document.getElementById("toast");
  if (!t) return;
  t.classList.remove("show", "persistent", "toast-error", "toast-warn", "toast-ok");
  t.textContent = "";
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
}

function showToast(msg, opts) {
  opts = opts || {};
  var t = document.getElementById("toast");
  if (!t) return;
  hideToast();
  if (opts.persistent) {
    t.innerHTML = '<span class="toast-text">' + esc(msg) + '</span><button type="button" class="toast-close" data-action="dismissToast" aria-label="閉じる">×</button>';
  } else {
    t.textContent = msg;
  }
  t.classList.add("show");
  if (opts.type === "error") t.classList.add("toast-error");
  else if (opts.type === "warn") t.classList.add("toast-warn");
  else if (opts.type === "ok") t.classList.add("toast-ok");
  if (opts.persistent) t.classList.add("persistent");
  else toastTimer = setTimeout(hideToast, opts.duration || 2200);
}

function setView(v) {
  if (isMemberMode) {
    if (v === "myprogress" && !myRosterId) {
      openMemberLoginModal();
      return;
    }
    if (v !== "main" && v !== "playoff" && v !== "awards" && v !== "myprogress") return;
  }
  if (v === "match") v = "main";
  currentView = v;
  if (v === "feedback") restoreFeedbackRosterSelection();
  document.querySelectorAll(".view-tab").forEach(el => {
    el.classList.toggle("active", el.dataset.view === v);
  });
  var masterBtn = document.getElementById("btnMasterSettings");
  if (masterBtn) masterBtn.classList.toggle("active", v === "master");
  var myBtn = document.getElementById("btnMyProgress");
  if (myBtn) myBtn.classList.toggle("active", v === "myprogress");
  render();
}

function renderStandings(league, sorted) {
  const inactivePlayers = league.players.filter(function(p) { return p.active === false; });
  const totalRequired = Math.max(0, sorted.length - 1);
  const isPre = league.id === "pre";
  const preTied7 = isPre ? sorted.filter(function(p) { return p.rank === J1_CUTOFF && p.played > 0; }) : [];
  const preTied7Ids = {};
  if (preTied7.length > 1) preTied7.forEach(function(p) { preTied7Ids[p.id] = true; });
  const preBanner = isPre ? ('<div class="j1-cutoff-banner"><strong>🏆 上位7名がJ1昇格対象</strong>' +
    (preTied7.length > 1 ? '<span class="j1-cutoff-note">7位同点 ' + preTied7.length + '名 → <b>入れ替え戦</b>タブで決定</span>' : '') +
    '</div>') : "";
  if (!sorted.length && !inactivePlayers.length) {
    return `<div class="card">
      <div class="card-title">順位表</div>
      <div style="font-size:.82rem;color:var(--muted);padding:8px">参加選手がいません。設定で参加ステータスを変更してください。</div>
    </div>`;
  }
  const printRows = sorted.map(p => {
    const unplayed = totalRequired - p.played;
    var cls = p.rank <= 3 && p.played > 0 ? ` st-top${p.rank}` : "";
    if (isPre && p.rank <= J1_CUTOFF && p.played > 0) cls += " st-j1";
    return `<tr class="${cls}">
      <td>${p.rank}</td>
      <td class="st-name">${esc(p.name)}${formatStripesPrint(getStripes(p))}</td>
      <td>${p.wins}</td>
      <td>${p.draws}</td>
      <td>${p.losses}</td>
      <td>${p.played}</td>
      <td>${unplayed}</td>
      <td class="st-pts">${p.points}</td>
    </tr>`;
  }).join("") + inactivePlayers.map(function(p) {
    return `<tr class="st-inactive">
      <td>—</td>
      <td class="st-name">${esc(p.name)}（未参加）</td>
      <td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td class="st-pts">—</td>
    </tr>`;
  }).join("");
  return `<div class="card">
    <div class="card-title">順位表 <span style="font-weight:400;font-size:.7rem">（選手名タップで直近5試合）</span></div>
    ${preBanner}
    <div class="standings">${sorted.map(p => {
      var cls = p.rank <= 3 && p.played > 0 ? ` top${p.rank}` : "";
      if (isPre && p.rank <= J1_CUTOFF && p.played > 0) cls += " j1-zone";
      if (isPre && p.rank === J1_CUTOFF && preTied7.length > 1) cls += " j1-zone-tie";
      var unplayed = getUnplayedCount(p, totalRequired);
      return `<div class="standing-row${cls}">
        <div class="rank-badge">${p.rank}</div>
        <div>${renderPlayerNameLine(p, false)}
          <div class="player-stats"><span class="player-stat-item player-stat-win">${p.wins}勝</span><span class="player-stat-item player-stat-draw">${p.draws}分</span><span class="player-stat-item player-stat-loss">${p.losses}敗</span><span class="player-stat-item player-stat-played">${p.played}試合</span></div></div>
        <div class="standing-stats-col">
          <div class="standing-stat">${renderUnplayedBlock(unplayed)}</div>
          <div class="standing-stat"><div class="points">${p.points}</div><div class="points-label">勝点</div></div>
        </div>
      </div>`;
    }).join("")}${inactivePlayers.map(function(p) {
      return `<div class="standing-row" style="opacity:.6">
        <div class="rank-badge">—</div>
        <div>${renderPlayerNameLine(p, false)}
          <div class="player-stats">未参加</div></div>
        <div class="standing-stats-col">
          <div class="standing-stat"><div class="unplayed-count">—</div><div class="points-label">残試合</div></div>
          <div class="standing-stat"><div class="points">—</div><div class="points-label">勝点</div></div>
        </div>
      </div>`;
    }).join("")}</div>
    <table class="standings-print">
      <thead><tr>
        <th>順</th><th>選手</th><th>勝</th><th>分</th><th>負</th>
        <th>消化</th><th>未消化</th><th>勝点</th>
      </tr></thead>
      <tbody>${printRows}</tbody>
    </table>
  </div>`;
}

function renderGrid(league, sorted, opts) {
  opts = opts || {};
  var playoffKey = opts.playoffKey || null;
  var gridTitle = opts.title || "星取表";
  var isPre = league.id === "pre";
  var preTied7Ids = {};
  if (isPre) {
    var tied7 = sorted.filter(function(p) { return p.rank === J1_CUTOFF && p.played > 0; });
    if (tied7.length > 1) tied7.forEach(function(p) { preTied7Ids[p.id] = true; });
  }
  const statMap = {};
  sorted.forEach(p => statMap[p.id] = p);
  var totalRequired = Math.max(0, sorted.length - 1);
  const players = league.players.slice().sort(function(a, b) {
    const aa = a.active === false ? 1 : 0;
    const bb = b.active === false ? 1 : 0;
    if (aa !== bb) return aa - bb;
    if (aa === 1) return a.name.localeCompare(b.name, "ja");
    return (statMap[a.id].played === 0 ? 1 : 0) - (statMap[b.id].played === 0 ? 1 : 0);
  });
  if (!players.length) {
    return `<div class="card">
      <div class="card-title">星取表</div>
      <div style="font-size:.82rem;color:var(--muted);padding:8px">参加選手がいません。設定で参加ステータスを変更してください。</div>
    </div>`;
  }
  let hdr = `<tr><th></th>`;
  players.forEach(function(p) {
    const suffix = p.active === false ? `<span class="grid-col-inactive">未</span>` : "";
    hdr += `<th class="grid-col-head"><span class="grid-col-name">${esc(p.name)}</span>${suffix}</th>`;
  });
  hdr += `<th class="remain-col">残</th><th class="total-col">勝点</th><th class="rank-col">順</th></tr>`;
  let body = "";
  for (const row of players) {
    var rowCls = "";
    if (isPre && statMap[row.id] && statMap[row.id].rank <= J1_CUTOFF && statMap[row.id].played > 0) rowCls = " j1-row";
    if (isPre && preTied7Ids[row.id]) rowCls += " j1-row-tie";
    body += `<tr class="${rowCls.trim()}"><th>${renderGridPlayerNameCell(row)}</th>`;
    for (const col of players) {
      if (row.id === col.id) {
        body += `<td class="diag diag-self"></td>`;
      } else if (row.active === false || col.active === false) {
        body += `<td class="diag diag-inactive">未</td>`;
      } else {
        const r = getResult(league, row.id, col.id);
        const lbl = cellSymbol(row.id, r);
        const cls = cellClass(row.id, r);
        const aria = r ? cellLabel(row.id, r) : "未入力";
        if (isMemberMode) {
          body += `<td><span class="cell-btn cell-readonly ${cls}" aria-label="${esc(aria)}" title="${esc(aria)}">${lbl}</span></td>`;
        } else {
          var pkAttr = playoffKey ? ' data-playoff-key="' + esc(playoffKey) + '"' : "";
          body += `<td><button type="button" class="cell-btn ${cls}" data-cell-a="${esc(row.id)}" data-cell-b="${esc(col.id)}" aria-label="${esc(aria)}" title="${esc(aria)}"${pkAttr}>${lbl}</button></td>`;
        }
      }
    }
    const s = statMap[row.id];
    if (row.active === false) body += `<td class="remain-col">—</td><td class="total-col">未</td><td class="rank-col">—</td></tr>`;
    else {
      var unplayed = getUnplayedCount(s, totalRequired);
      var remainCls = unplayed === 0 ? " remain-zero" : "";
      body += `<td class="remain-col${remainCls}">${unplayed}</td><td class="total-col">${s.points}</td><td class="rank-col">${s.rank}</td></tr>`;
    }
  }
  const legend = `<div class="print-legend">
    <span><b style="color:#c5ced9">□</b>未入力</span>
    <span><b style="color:#1e7a4a">◎</b>一本勝</span>
    <span><b style="color:#2a8a55">○</b>優勢勝</span>
    <span><b style="color:#8a6d1a">△</b>引分</span>
    <span><b style="color:#c44">▲</b>優勢負</span>
    <span><b style="color:#b83232">✕</b>一本負</span>
  </div>`;
  const gridHtml = isLegacyIOS()
    ? `<div class="grid-wrap grid-wrap-split">
        <div class="grid-split-head"><div class="grid-split-head-scroll"><table class="grid-table grid-table-head"><thead>${hdr}</thead></table></div></div>
        <div class="grid-split-body"><table class="grid-table grid-table-body"><tbody>${body}</tbody></table></div>
      </div>`
    : `<div class="grid-wrap"><table class="grid-table"><thead>${hdr}</thead><tbody>${body}</tbody></table></div>`;
  var subtitleItems = [];
  if (isPre) subtitleItems.push("青背景＝J1昇格圏（上位7名）");
  if (isMemberMode) subtitleItems.push("行の選手名タップで直近5試合");
  else subtitleItems.push("スマホ・タブレットは長押しで入力");
  var subtitleHtml = subtitleItems.length
    ? '<div class="grid-subtitle">' + subtitleItems.map(function(s) {
        return '<span class="grid-subtitle-item">' + esc(s) + '</span>';
      }).join("") + '</div>'
    : "";
  return `<div class="card">
    <div class="card-title">${esc(gridTitle)}</div>
    ${subtitleHtml}
    ${legend}
    ${gridHtml}
  </div>`;
}

      <input id="ghToken" type="password" autocomplete="off" placeholder="${ghCfg.token ? '設定済み（変更する場合のみ入力）' : 'github_pat_...'}">
    </div>
    <button type="button" class="btn btn-primary btn-block" style="margin-top:10px" data-action="saveGhSettings">設定を保存して同期開始</button>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button type="button" class="btn btn-ghost" style="flex:1" data-action="manualPush">↑ 今すぐ保存</button>
      <button type="button" class="btn btn-ghost" style="flex:1" data-action="manualPull">↓ クラウドから読込</button>
    </div>
    <div id="ghStatusLine" style="font-size:.72rem;color:var(--muted);margin-top:8px"></div>
  </div>`;
}

function updateGhStatusLine() {
  const el = document.getElementById("ghStatusLine");
  if (!el) return;
  if (!ghReady()) { el.textContent = "状態: 未設定（自動保存オフ）"; return; }
  const labels = { syncing: "同期中…", synced: "同期済み", error: "エラー", off: "オフ" };
  var line = "状態: " + (labels[ghSyncState] || ghSyncState);
  if (ghLastMsg) line += ghSyncState === "error" ? " — " + formatGhError(ghLastMsg) : "（" + ghLastMsg + "）";
  el.textContent = line;
}

function saveGhSettings() {
  const t = document.getElementById("ghToken").value.trim();
  if (t) ghCfg.token = t;
  ghCfg.owner = GH_FIXED_CFG.owner;
  ghCfg.repo = GH_FIXED_CFG.repo;
  ghCfg.branch = GH_FIXED_CFG.branch;
  ghCfg.path = GH_FIXED_CFG.path;
  if (!ghCfg.token) { showToast("アクセストークンを入力してください"); setSyncState("off"); return; }
  saveGhCfg();
  ghSha = null;
  setSyncState("syncing");
  testGhToken().then(function() {
    showToast("同期設定を保存しました ✓");
    return cloudPush();
  }).catch(function(e) {
    setSyncState("error", String(e.message || e));
    showToast(formatGhError(e.message || e));
  });
}

async function manualPush() {
  if (!ghReady()) { showToast("先に同期設定を保存してください"); return; }
  setSyncState("syncing");
  try {
    ghSha = null;
    var remote = await cloudPull();
    if (remote) applyMergedCloudState(mergeCloudStates(state, remote));
    await cloudPush();
    showToast(ghSyncState === "synced" ? "クラウドへ保存しました ✓" : "保存に失敗しました");
  } catch (e) {
    setSyncState("error", String(e.message || e));
    showToast("保存に失敗しました");
  }
}

async function manualPull() {
  if (!ghReady()) { showToast("先に同期設定を保存してください"); return; }
  if (!confirm("クラウドのデータを読み込み、この端末の表示を置き換えますか？")) return;
  setSyncState("syncing");
  try {
    const remote = await cloudPull();
    if (!remote) { showToast("クラウドにデータがありません"); setSyncState("synced"); return; }
    state = normalizeState(remote);
    viewingArchiveId = null;
    if (!getLeague(currentLeagueId)) currentLeagueId = state.leagues[0] ? state.leagues[0].id : null;
    saveLocal();
    render();
    setSyncState("synced", "読込 " + formatConfirmDate(Date.now()));
    showToast("クラウドから読み込みました ✓");
  } catch (e) {
    setSyncState("error", String(e.message || e));
    showToast("読み込みに失敗しました");
  }
}

function openPlayerHistory(playerId) {
  var league = getLeague(currentLeagueId);
  var player = findPlayerGlobal(playerId);
  if (!player) return;
  var matchLeague = league;
  var inCurrent = false;
  if (matchLeague) {
    for (var ci = 0; ci < matchLeague.players.length; ci++) {
      if (matchLeague.players[ci].id === playerId) { inCurrent = true; break; }
    }
  }
  if (!inCurrent) {
    for (var li = 0; li < state.leagues.length; li++) {
      var lg = state.leagues[li];
      for (var pi = 0; pi < lg.players.length; pi++) {
        if (lg.players[pi].id === playerId) { matchLeague = lg; break; }
      }
    }
  }
  var ctx = getActiveContext();
  var sorted = matchLeague ? computeStats(matchLeague).sorted : [];
  var rankInfo = "";
  for (var j = 0; j < sorted.length; j++) {
    if (sorted[j].id === playerId) {
      var unplayed = getUnplayedCount(sorted[j], Math.max(0, sorted.length - 1));
      rankInfo = sorted[j].rank + "位 / " + sorted[j].points + "勝点 / 残" + unplayed + "試合 / " + matchLeague.name;
      break;
    }
  }
  if (getStripes(player) > 0 && rankInfo.indexOf("ストライプ") < 0) rankInfo += " / ストライプ" + getStripes(player) + "本";
  var matches = matchLeague ? getRecentMatches(matchLeague, playerId, 5) : [];
  document.getElementById("playerModalTitle").textContent = player.name + " の直近試合";
  var stripeHtml = getStripes(player) > 0 ? renderStripeVisual(player) : "";
  var infoHtml = esc(rankInfo + " ｜ " + ctx.seasonLabel);
  if (stripeHtml) infoHtml += ' <span style="margin-left:6px">' + stripeHtml + '</span>';
  document.getElementById("playerModalInfo").innerHTML = infoHtml;
  var listEl = document.getElementById("playerModalList");
  if (!matches.length) {
    listEl.innerHTML = '<div class="player-history-empty">試合記録がありません</div>';
  } else {
    listEl.innerHTML = matches.map(function(m) {
      var status = resultStatusLabel(playerId, m.result);
      var symCls = resultSymbolClass(playerId, m.result);
      var statusColor = symCls.indexOf("win") >= 0 ? "var(--win)" : (symCls === "draw" ? "var(--draw)" : "var(--lose)");
      return '<div class="player-history-item">' +
        '<div><div class="hist-vs">vs ' + esc(m.opponentName) + '</div>' +
        '<div class="hist-league">' + esc(m.leagueName) + '</div></div>' +
        '<div class="hist-status" style="color:' + statusColor + '">' + esc(status) + '</div>' +
        '<div class="hist-date">' + esc(formatMatchDate(m.playedAt)) + '</div></div>';
    }).join("");
  }
  var pmodal = document.getElementById("playerModal");
  if (pmodal) {
    pmodal.classList.add("open");
    pmodal.style.display = "flex";
    pmodal.style.visibility = "visible";
    pmodal.style.pointerEvents = "auto";
    setPlayerModalOpen(true);
  }
}

function closePlayerModal() {
  var pmodal = document.getElementById("playerModal");
  if (pmodal) {
    pmodal.classList.remove("open");
    pmodal.style.display = "none";
    pmodal.style.visibility = "hidden";

function esc(s) {

function buildObsidianMD() {
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
  let md = `---\ntags: [Jリーグ, 星取表, 柔道]\nseason: "${getActiveContext().seasonSlug}"\nupdated: "${dateStr}"\n---\n\n`;
  md += `# 🥋 米倉道場 Jリーグ 星取表（${getActiveContext().seasonLabel}）\n\n`;
  md += `> 勝ち点: 一本勝${getActiveContext().pointRule.ippon}点 / 優勢勝${getActiveContext().pointRule.yusei}点 / 引分${getActiveContext().pointRule.draw}点 / 負け${getActiveContext().pointRule.lose}点\n\n`;
  for (const league of getActiveContext().leagues) {
    const { sorted } = computeStats(league);
    md += `## ${league.name}\n\n`;
    md += `### 順位\n\n| 順位 | 選手 | 勝 | 分 | 負 | 勝点 |\n|------|------|----|----|----|----|\n`;
    for (const p of sorted) {
      md += `| ${p.rank} | ${p.name} | ${p.wins} | ${p.draws} | ${p.losses} | **${p.points}** |\n`;
    }
    md += `\n### 星取表\n\n`;
    const ps = getActivePlayers(league);
    if (!ps.length) {
      md += `_参加選手なし_\n\n`;
      continue;
    }
    md += `| | ${ps.map(p => p.name).join(" | ")} | 勝点 | 順位 |\n`;
    md += `|------|${ps.map(() => "------").join("|")}|------|------|\n`;
    for (const row of ps) {
      const s = sorted.find(p => p.id === row.id);
      let line = `| **${row.name}** |`;
      for (const col of ps) {
        if (row.id === col.id) line += " ＼ |";
        else {
          const r = getResult(league, row.id, col.id);
          line += ` ${cellLabel(row.id, r) || ""} |`;
        }
      }
      line += ` **${s.points}** | ${s.rank} |\n`;
      md += line;
    }
    md += `\n`;
  }
  md += `\n---\n*${dateStr} 時点（Jリーグ星取表アプリから出力）*\n`;
  return md;
}

function exportObsidian() {
  const md = buildObsidianMD();
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay open";
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  "empty": ["#fff8e6", "#9a7b1a"],
  "win-ippon": ["#e8f6ee", "#1e7a4a"],
  "win-yusei": ["#edf7f0", "#2a8a55"],

function drawGridHeaderName(ctx, text, x, y, w, h) {
  ctx.save();
  ctx.fillStyle = "#ffffff";
  ctx.font = "10px -apple-system,'Hiragino Sans',sans-serif";
  ctx.textAlign = "left";
  ctx.textBaseline = "top";
  ctx.translate(x + w / 2, y + h - 6);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function buildExportCanvas(league) {
  const S = 2;
  const { sorted } = computeStats(league);
  const statMap = {};
  sorted.forEach(p => statMap[p.id] = p);
  const gridPlayers = getActivePlayers(league).slice().sort(function(a, b) {
    return (statMap[a.id].played === 0 ? 1 : 0) - (statMap[b.id].played === 0 ? 1 : 0);
  });
  if (!gridPlayers.length) throw new Error("参加選手がいません");
  const n = league.players.length;
  const totalRequired = Math.max(0, n - 1);
  const pad = 24;
  const titleH = 32, subH = 22, secTitleH = 24, sectionGap = 20;
  const stRowH = 30;
  const nameW = 84, cellW = 40, ptsW = 48, rankW = 38, rowH = 36;
  var nameLens = gridPlayers.map(function(p) { return p.name.length; });
  var maxNameLen = Math.max.apply(null, [1].concat(nameLens));
  const headH = Math.max(92, maxNameLen * 11 + 16);
  const gridW = nameW + n * cellW + ptsW + rankW;
  const stFixed = 36 + 36 + 36 + 36 + 44 + 44 + 52;
  const playerColW = Math.max(100, gridW - stFixed);
  const stCols = [["順", 36], ["選手", playerColW], ["勝", 36], ["分", 36], ["負", 36], ["消化", 44], ["未消化", 44], ["勝点", 52]];
  const stW = gridW;
  const stH = stRowH * (n + 1);
  const gridH = headH + n * rowH;
  const W = gridW + pad * 2;
  const H = pad + titleH + subH + 12 + secTitleH + stH + sectionGap + secTitleH + gridH + pad;

  const canvas = document.createElement("canvas");
  canvas.width = Math.round(W * S);
  canvas.height = Math.round(H * S);
  const ctx = canvas.getContext("2d");
  ctx.scale(S, S);
  ctx.textBaseline = "middle";
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, W, H);

  let y = pad;
  ctx.fillStyle = "#1a2744";
  ctx.font = "bold 19px -apple-system,'Hiragino Sans',sans-serif";
  ctx.textAlign = "left";
  ctx.fillText(`🥋 米倉道場 ${league.name} 星取表`, pad, y + titleH / 2);
  y += titleH;
  const pr = getActiveContext().pointRule;
  ctx.fillStyle = "#5c6b8a";
  ctx.font = "12px -apple-system,'Hiragino Sans',sans-serif";
  ctx.fillText(getActiveContext().seasonLabel + " ・ 一本勝" + pr.ippon + " / 優勢勝" + pr.yusei + " / 引分" + pr.draw + " / 負け" + pr.lose, pad, y + subH / 2);
  y += subH + 12;

  ctx.fillStyle = "#1a2744";
  ctx.font = "bold 14px -apple-system,'Hiragino Sans',sans-serif";
  ctx.fillText("順位表", pad, y + secTitleH / 2);
  y += secTitleH;
  let hx = pad;
  ctx.font = "bold 12px -apple-system,'Hiragino Sans',sans-serif";
  ctx.fillStyle = "#2d4a7a";
  ctx.fillRect(pad, y, stW, stRowH);
  ctx.fillStyle = "#ffffff";
  for (const [label, w] of stCols) {
    ctx.textAlign = (label === "選手") ? "left" : "center";
    ctx.fillText(label, label === "選手" ? hx + 8 : hx + w / 2, y + stRowH / 2);
    hx += w;
  }
  y += stRowH;
  sorted.forEach((p, i) => {
    ctx.fillStyle = i % 2 ? "#f4f6fb" : "#ffffff";
    ctx.fillRect(pad, y, stW, stRowH);
    if (p.rank <= 3 && p.played > 0) {
      ctx.fillStyle = ["#ffd700", "#c0c0c0", "#cd7f32"][p.rank - 1];
      ctx.fillRect(pad, y, 4, stRowH);
    }
    let cx = pad;
    const unplayed = totalRequired - p.played;
    const vals = [p.rank, p.name, p.wins, p.draws, p.losses, p.played, unplayed, p.points];
    stCols.forEach(([label, w], ci) => {
      ctx.fillStyle = (ci === 7) ? "#2d5a8e" : "#1a2744";
      ctx.font = (ci === 7) ? "bold 13px -apple-system,'Hiragino Sans',sans-serif"
        : (ci === 1) ? "bold 13px -apple-system,'Hiragino Sans',sans-serif"
        : "12px -apple-system,'Hiragino Sans',sans-serif";
      ctx.textAlign = (ci === 1) ? "left" : "center";
      ctx.fillText(String(vals[ci]), ci === 1 ? cx + 8 : cx + w / 2, y + stRowH / 2);
      cx += w;
    });
    y += stRowH;
  });

  y += sectionGap;
  ctx.fillStyle = "#1a2744";
  ctx.font = "bold 14px -apple-system,'Hiragino Sans',sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("星取表", pad, y + secTitleH / 2);
  y += secTitleH;

  const gx0 = pad, gy0 = y;
  ctx.fillStyle = "#1a2744";
  ctx.fillRect(gx0, gy0, gridW, headH);
  ctx.fillStyle = "#2d4a7a";
  ctx.fillRect(gx0 + nameW + n * cellW, gy0, ptsW + rankW, headH);
  ctx.fillStyle = "#ffffff";
  gridPlayers.forEach((p, c) => {
    const cx = gx0 + nameW + c * cellW;
    drawGridHeaderName(ctx, p.name, cx, gy0, cellW, headH);
  });
  ctx.textAlign = "center";
  ctx.font = "bold 11px -apple-system,'Hiragino Sans',sans-serif";
  ctx.fillText("勝点", gx0 + nameW + n * cellW + ptsW / 2, gy0 + headH / 2);
  ctx.fillText("順", gx0 + nameW + n * cellW + ptsW + rankW / 2, gy0 + headH / 2);

  gridPlayers.forEach((row, ri) => {
    const ry = gy0 + headH + ri * rowH;
    ctx.fillStyle = "#eef2f9";
    ctx.fillRect(gx0, ry, nameW, rowH);
    ctx.fillStyle = "#1a2744";
    ctx.font = "bold 12px -apple-system,'Hiragino Sans',sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(row.name, gx0 + 6, ry + rowH / 2);
    gridPlayers.forEach((col, ci) => {
      const cx = gx0 + nameW + ci * cellW;
      if (row.id === col.id) {
        ctx.fillStyle = "#dde4f0";
        ctx.fillRect(cx, ry, cellW, rowH);
        ctx.fillStyle = "#5c6b8a";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("＼", cx + cellW / 2, ry + rowH / 2);
      } else {
        const r = getResult(league, row.id, col.id);
        const cls = cellClass(row.id, r);
        const [bg, fg] = EXPORT_COLORS[cls];
        ctx.fillStyle = bg;
        ctx.fillRect(cx, ry, cellW, rowH);
        const lbl = cellLabel(row.id, r);
        if (!r) {
          ctx.strokeStyle = "#d4a82a";
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(cx + 2, ry + 2, cellW - 4, rowH - 4);
          ctx.setLineDash([]);
        }
        if (lbl) {
          ctx.fillStyle = fg;
          ctx.font = "10px -apple-system,'Hiragino Sans',sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(lbl, cx + cellW / 2, ry + rowH / 2);
        } else {
          ctx.fillStyle = fg;
          ctx.font = "bold 11px -apple-system,'Hiragino Sans',sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("・", cx + cellW / 2, ry + rowH / 2);
        }
      }
    });
    const s = statMap[row.id];
    const tx = gx0 + nameW + n * cellW;
    ctx.fillStyle = "#f0f4fa";
    ctx.fillRect(tx, ry, ptsW + rankW, rowH);
    ctx.fillStyle = "#2d5a8e";
    ctx.font = "bold 13px -apple-system,'Hiragino Sans',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(String(s.points), tx + ptsW / 2, ry + rowH / 2);
    ctx.fillStyle = "#5c6b8a";
    ctx.fillText(String(s.rank), tx + ptsW + rankW / 2, ry + rowH / 2);
  });

  ctx.strokeStyle = "#d8e0ef";
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= n; i++) {
    const ly = gy0 + headH + i * rowH;
    ctx.beginPath(); ctx.moveTo(gx0, ly); ctx.lineTo(gx0 + gridW, ly); ctx.stroke();
  }
  for (let i = 0; i <= n; i++) {
    const lx = gx0 + nameW + i * cellW;
    ctx.beginPath(); ctx.moveTo(lx, gy0); ctx.lineTo(lx, gy0 + gridH); ctx.stroke();
  }

  return { canvas, cssW: W, cssH: H };
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 4000);
}

function exportPDF() {
  const league = getLeague(currentLeagueId);
  if (getActivePlayers(league).length < 2) { showToast("参加選手が2名未満です"); return; }
  const { canvas, cssW, cssH } = buildExportCanvas(league);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
  const bin = atob(dataUrl.split(",")[1]);
  const jpeg = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) jpeg[i] = bin.charCodeAt(i);
  const blob = buildPdfFromJpeg(jpeg, canvas.width, canvas.height, cssW, cssH);
  downloadBlob(blob, league.name + "_星取表_" + getActiveContext().seasonSlug + ".pdf");
  showToast("PDFを保存しました ✓");
}

function buildPdfFromJpeg(jpeg, pxW, pxH, cssW, cssH) {
  const maxPt = 780;
  const sc = maxPt / Math.max(cssW, cssH);
  const W = (cssW * sc).toFixed(2), H = (cssH * sc).toFixed(2);
  const content = `q ${W} 0 0 ${H} 0 0 cm /Im0 Do Q`;
  const latin1 = s => { const u = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i) & 0xff; return u; };
  const parts = []; let offset = 0; const xref = [];
  const push = u8 => { parts.push(u8); offset += u8.length; };
  const pushStr = s => push(latin1(s));
  const startObj = () => xref.push(offset);
  pushStr("%PDF-1.4\n%\u00e2\u00e3\u00cf\u00d3\n");
  startObj(); pushStr("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n");
  startObj(); pushStr("2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n");
  startObj(); pushStr(`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Resources << /XObject << /Im0 5 0 R >> >> /Contents 4 0 R >>\nendobj\n`);
  startObj(); pushStr(`4 0 obj\n<< /Length ${content.length} >>\nstream\n${content}\nendstream\nendobj\n`);
  startObj();
  pushStr(`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${pxW} /Height ${pxH} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpeg.length} >>\nstream\n`);
  push(jpeg);
  pushStr("\nendstream\nendobj\n");
  const xrefStart = offset;
  let x = "xref\n0 6\n0000000000 65535 f \n";
  for (const o of xref) x += String(o).padStart(10, "0") + " 00000 n \n";
  pushStr(x);
  pushStr(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`);
  return new Blob(parts, { type: "application/pdf" });
}

}

function getGridColumnWidthsSplit(headTable, bodyTable) {
  var headerCells = headTable.querySelectorAll("thead th");
  var colCount = headerCells.length;
  var widths = [];
  var rows = bodyTable.querySelectorAll("tbody tr");
  var c, r, w, cell;
  for (c = 0; c < colCount; c++) {
    w = 0;
    if (headerCells[c]) w = Math.max(w, headerCells[c].offsetWidth);
    for (r = 0; r < rows.length; r++) {
      cell = rows[r].children[c];
      if (cell) w = Math.max(w, cell.offsetWidth);
    }
    widths.push(Math.ceil(w));
  }
  return widths;
}

function applyGridColWidths(table, widths) {
  var old = table.querySelector("colgroup");
  if (old) old.parentNode.removeChild(old);
  var cg = document.createElement("colgroup");
  var total = 0;
  for (var i = 0; i < widths.length; i++) {
    var col = document.createElement("col");
    col.style.width = widths[i] + "px";
    cg.appendChild(col);
    total += widths[i];
  }
  table.insertBefore(cg, table.firstChild);
  table.style.tableLayout = "fixed";
  table.style.width = total + "px";
  table.style.minWidth = total + "px";
  table.style.maxWidth = "none";
  return total;
}

function applyGridNameScale(table, scale) {
  var wrap = table.closest(".grid-wrap, .grid-wrap-split");
  if (!wrap) return;
  var s = String(Math.max(0.92, Math.min(1, scale)));
  wrap.style.setProperty("--grid-name-scale", s);
  wrap.style.setProperty("--grid-head-scale", s);
}

function measureInlineTextWidth(text, fontSize, fontWeight, fontFamily) {
  var el = getGridMeasureEl();
  el.style.fontSize = fontSize || "";

  el.style.fontFamily = fontFamily || "";

function measureGridNameColNeed(table) {
  var maxW = 52;
  var sampleTh = table.querySelector("tbody th");
  var cs = sampleTh ? window.getComputedStyle(sampleTh) : null;
  var lines = table.querySelectorAll("tbody th .player-name-line");
  var i, line, tap, stripe, w, padX, lineW;
  padX = cs ? parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight) : 12;
  for (i = 0; i < lines.length; i++) {
    line = lines[i];
    tap = line.querySelector(".player-tap");
    stripe = line.querySelector(".stripe-visual-sm, .stripe-visual");
    w = padX + 6;
    if (tap) w += measureInlineTextWidth(tap.textContent, cs && cs.fontSize, cs && cs.fontWeight, cs && cs.fontFamily);
    if (stripe) w += stripe.offsetWidth + 4;
    lineW = line.scrollWidth + padX;
    maxW = Math.max(maxW, w, lineW);
  }
  return Math.ceil(maxW);
}

function measureGridHeadColNeed(th) {
  if (!th) return 28;
  var cs = window.getComputedStyle(th);
  var nameEl = th.querySelector(".grid-col-name");
  var inactive = th.querySelector(".grid-col-inactive");
  var w = 0;
  if (nameEl) {
    w += measureInlineTextWidth(nameEl.textContent, cs.fontSize, cs.fontWeight, cs.fontFamily);
  } else {
    w += measureInlineTextWidth(th.textContent, cs.fontSize, cs.fontWeight, cs.fontFamily);
  }
  if (inactive) {
    w += measureInlineTextWidth(inactive.textContent, cs.fontSize, cs.fontWeight, cs.fontFamily) + 2;
  }
  w += parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight) + 2;
  return Math.ceil(Math.max(28, w));
}

function fitGridColumns() {
  var wraps = document.querySelectorAll(".grid-wrap, .grid-wrap-split");
  var compactEmbedGrid = detectEmbedded() && !isMemberMode;
  for (var wi = 0; wi < wraps.length; wi++) {
    var wrap = wraps[wi];
    var avail = wrap.clientWidth || 0;
    var headTable = wrap.querySelector(".grid-table-head");
    var bodyTable = wrap.querySelector(".grid-table-body");
    var fullTable = wrap.querySelector(".grid-table:not(.grid-table-head):not(.grid-table-body)");
    var headerTable = headTable || fullTable;
    var nameTable = bodyTable || fullTable;
    if (!headerTable || !nameTable) continue;

    var headers = headerTable.querySelectorAll("thead th");
    if (!headers.length) continue;
    var n = headers.length;
    var statCols = 3;
    var dataCols = n - 1 - statCols;
    if (dataCols < 1) continue;

    var minData = compactEmbedGrid ? 32 : 36;
    var scale = 1;
    var statW, nameW, dataWidths, total, d, si;

    while (scale >= 0.92) {
      applyGridNameScale(nameTable, scale);
      void wrap.offsetWidth;
      nameW = measureGridNameColNeed(nameTable);
      dataWidths = [];
      for (d = 0; d < dataCols; d++) {
        dataWidths.push(Math.max(minData, measureGridHeadColNeed(headers[d + 1])));
      }
      statW = 34;
      for (si = n - statCols; si < n; si++) {
        statW = Math.max(statW, measureGridHeadColNeed(headers[si]));
      }
      total = nameW + statW * statCols;
      for (d = 0; d < dataCols; d++) total += dataWidths[d];
      if (!compactEmbedGrid || !avail || total <= avail) break;
      scale = Math.round((scale - 0.02) * 100) / 100;
    }

    if (!compactEmbedGrid) {
      applyGridNameScale(nameTable, 1);
      void wrap.offsetWidth;
    }
    nameW = measureGridNameColNeed(nameTable);
    dataWidths = [];
    for (d = 0; d < dataCols; d++) {
      dataWidths.push(Math.max(minData, measureGridHeadColNeed(headers[d + 1])));
    }
    statW = 34;
    for (si = n - statCols; si < n; si++) {
      statW = Math.max(statW, measureGridHeadColNeed(headers[si]));
    }

    var widths = [nameW];
    for (d = 0; d < dataCols; d++) widths.push(dataWidths[d]);
    widths.push(statW, statW, statW);

    var applyTables = wrap.querySelectorAll(".grid-table, .grid-table-head, .grid-table-body");
    for (var ti = 0; ti < applyTables.length; ti++) {
      applyGridColWidths(applyTables[ti], widths);
    }
  }
}

function initLegacyGridScroll() {
  if (!isLegacyIOS()) return;
  var wraps = document.querySelectorAll(".grid-wrap-split");

      function onBodyScroll() {

      if (!wrap.getAttribute("data-split-ready")) {
        wrap.setAttribute("data-split-ready", "1");
        bodyScroll.addEventListener("scroll", onBodyScroll, false);
      }
      onBodyScroll();
    })(wraps[wi]);
  }
}

function isTouchDevice() {
  return "ontouchstart" in window || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
}

function findCellBtn(start) {
  var n = start;
  while (n && n !== document.body) {
    if (n.classList && n.classList.contains("cell-btn")) return n;
    n = n.parentNode;
  }
  return null;
}

function clearCellLongPress() {
  if (!cellLongPress) return;
  if (cellLongPress.timer) clearTimeout(cellLongPress.timer);
  if (cellLongPress.el) cellLongPress.el.classList.remove("pressing");
  cellLongPress = null;
}

function findTapTarget(start) {
  var n = start;
  while (n && n !== document.body) {
    if (n.getAttribute && (
      n.getAttribute("data-view") ||
      n.getAttribute("data-league-id") ||
      n.getAttribute("data-player-id") ||
      n.getAttribute("data-cell-a") ||
      n.getAttribute("data-action") ||
      n.getAttribute("data-remove-player") ||
      n.hasAttribute("data-modal-r") ||
      n.id === "btnExportImage" ||
      n.id === "btnExportPDF" ||
      n.id === "btnMasterSettings" ||
      n.id === "btnMyProgress" ||
      n.id === "syncStatus" ||
      n.id === "cellModal" ||
      n.id === "playerModal" ||
      n.id === "memberLoginModal" ||
      n.id === "reviewHistoryModal"
    )) return n;
    n = n.parentNode;
  }
  return null;
}

function isNativeTextInput(el) {
  if (!el || !el.tagName) return false;
  var tag = el.tagName.toUpperCase();
  if (tag === "TEXTAREA") return true;
  if (tag === "LABEL") return true;
  if (tag === "INPUT") {
    var type = (el.type || "text").toLowerCase();
    return type !== "button" && type !== "submit" && type !== "reset" && type !== "checkbox" && type !== "radio";
  }
  return false;
}

function handleAppTap(e) {
  if (isNativeTextInput(e.target)) return;
  var target = findTapTarget(e.target);
  if (!target) return;
  if (e && e.type === "touchend" && e.cancelable) e.preventDefault();
  if (target.id === "cellModal" && e.target === target) { closeModal(); return; }
  if (target.id === "playerModal" && e.target === target) { closePlayerModal(); return; }
  if (target.id === "memberLoginModal" && e.target === target) { closeMemberLoginModal(); return; }
  if (target.id === "reviewHistoryModal" && e.target === target) { closeReviewHistoryModal(); return; }
  var playerId = target.getAttribute("data-player-id");
  if (playerId) { openPlayerHistory(playerId); return; }
  var view = target.getAttribute("data-view");
  if (view) { setView(view); return; }
  if (target.id === "syncStatus") {
    if (ghSyncState === "error" && ghLastMsg) showToast(formatGhError(ghLastMsg));
    else if (ghReady()) {
      cloudPullIfNewer(false).then(function(updated) {
        if (!updated && ghSyncState === "synced") showToast("クラウドは最新です", { type: "ok", duration: 2000 });
      });
    }
    setView("master");
    return;
  }
  if (target.id === "btnExportImage") { exportImage(); return; }
  if (target.id === "btnExportPDF") { exportPDF(); return; }
  if (target.id === "btnMasterSettings") { setView("master"); return; }
  if (target.id === "btnMyProgress") { openMyProgress(); return; }
  var leagueId = target.getAttribute("data-league-id");
  if (leagueId) { selectLeague(leagueId); return; }
  var cellA = target.getAttribute("data-cell-a");
  var cellB = target.getAttribute("data-cell-b");
  if (cellA && cellB) {
    var pk = target.getAttribute("data-playoff-key");
    if (e.type !== "touchend") openCellModal(cellA, cellB, pk || null);
    return;
  }
  var removeId = target.getAttribute("data-remove-player");
  if (removeId) { removePlayer(removeId); return; }
  if (target.hasAttribute("data-modal-r")) {
    var mr = target.getAttribute("data-modal-r");
    var mw = target.getAttribute("data-modal-w");
    modalSet(mr || null, mw || null);
    return;
  }
  var action = target.getAttribute("data-action");
  if (action === "addPlayer") addPlayer();
  else if (action === "resetLeague") resetLeague();
  else if (action === "resetAll") resetAll();
  else if (action === "saveGhSettings") saveGhSettings();
  else if (action === "manualPush") manualPush();
  else if (action === "manualPull") manualPull();
  else if (action === "applySeason") applySeasonSettings();
  else if (action === "archiveSeason") archiveCurrentSeason();
  else if (action === "confirmAwards") confirmAwardsSnapshot();
  else if (action === "lockMonthlyMvp") lockMonthlyMvpForLeague(target.getAttribute("data-league-id"));
  else if (action === "deleteAwardConfirmation") deleteAwardConfirmation(target.getAttribute("data-confirm-id"));
  else if (action === "addRosterMember") addRosterMember(document.getElementById("newRosterName") ? document.getElementById("newRosterName").value : "");
  else if (action === "addRosterToLeague") {
    var pick = document.getElementById("rosterLeaguePick");
    addRosterMemberToLeague(target.getAttribute("data-roster-id"), pick ? pick.value : currentLeagueId);
  }
  else if (action === "openStripeReview") openStripeReview(target.getAttribute("data-roster-id"));
  else if (action === "draftMemberComment") draftMemberCommentFromReviews(target.getAttribute("data-roster-id"));
  else if (action === "importMemberListCsv") importMemberListCsvPrompt();
  else if (action === "batchDraftMemberComments") batchDraftMemberComments();
  else if (action === "saveRosterMemberDisplay") saveRosterMemberDisplay(target.getAttribute("data-roster-id"));
  else if (action === "selectFeedbackMember") selectFeedbackMember(target.getAttribute("data-roster-id"));
  else if (action === "saveFeedback") saveFeedbackFromPage(target.getAttribute("data-roster-id"));
  else if (action === "openReviewHistory") openReviewHistoryModal(target.getAttribute("data-roster-id"));
  else if (action === "closeReviewHistory") closeReviewHistoryModal();
  else if (action === "deleteStripeReview") deleteStripeReview(target.getAttribute("data-roster-id"), target.getAttribute("data-review-id"));
  else if (action === "setAwardsYear") setAwardsYear(target.getAttribute("data-awards-year"));
  else if (action === "setAwardsSeason") setAwardsSeason(target.getAttribute("data-awards-season"));
  else if (action === "setAwardsScope") setAwardsScope(target.getAttribute("data-awards-scope"));
  else if (action === "openMemberLogin") openMemberLoginModal();
  else if (action === "closeMemberLogin") closeMemberLoginModal();
  else if (action === "submitMemberLogin") submitMemberLogin();
  else if (action === "logoutMember") logoutMemberSession();
  else if (action === "closeStripeReview") closeStripeReview();
  else if (action === "submitStripeReview") submitStripeReview(target.getAttribute("data-result"));
  else if (action === "removeRosterMember") removeRosterMember(target.getAttribute("data-roster-id"));
  else if (action === "adjustAttendance") adjustRosterAttendance(target.getAttribute("data-roster-id"), parseInt(target.getAttribute("data-delta"), 10) || 1);
  else if (action === "setMarubatsu") setMarubatsu(target.getAttribute("data-mb-cat"), target.getAttribute("data-mb-idx"), target.getAttribute("data-mb-val"));
  else if (action === "pasteSposuruCsv") pasteSposuruCsv();
  else if (action === "resetRosterAttendanceAll") resetRosterAttendanceAll();
  else if (action === "dismissSposuruAlert") clearSposuruImportAlert();
  else if (action === "dismissToast") hideToast();
  else if (action === "exitArchive") exitArchiveView();
  else if (action === "viewArchive") viewArchive(target.getAttribute("data-archive-id"));
  else if (action === "deleteArchive") deleteArchive(target.getAttribute("data-archive-id"));
  else if (action === "pickSeasonKey") pickSeasonKey(target.getAttribute("data-season-key"));
  else if (action === "closePlayerModal") closePlayerModal();
}

function bindAppEvents() {
  var lastTouchAt = 0;
  document.addEventListener("touchstart", function(e) {
    if (!isTouchDevice() || isMemberMode) return;
    var btn = findCellBtn(e.target);
    if (!btn) return;
    var cellA = btn.getAttribute("data-cell-a");
    var cellB = btn.getAttribute("data-cell-b");
    if (!cellA || !cellB) return;
    var pk = btn.getAttribute("data-playoff-key");
    clearCellLongPress();
    var t = e.touches && e.touches[0];
    if (!t) return;
    btn.classList.add("pressing");
    var timer = setTimeout(function() {
      if (!cellLongPress) return;
      cellLongPress.fired = true;
      if (cellLongPress.el) cellLongPress.el.classList.remove("pressing");
      openCellModal(cellLongPress.idA, cellLongPress.idB, cellLongPress.pk || null);
      clearCellLongPress();
    }, CELL_LONG_PRESS_MS);
    cellLongPress = { el: btn, idA: cellA, idB: cellB, pk: pk, sx: t.clientX, sy: t.clientY, timer: timer, fired: false };
  }, false);
  document.addEventListener("touchmove", function(e) {
    if (!cellLongPress) return;
    var t = e.touches && e.touches[0];
    if (!t) return;
    var dx = t.clientX - cellLongPress.sx;
    var dy = t.clientY - cellLongPress.sy;
    if (dx * dx + dy * dy > 100) clearCellLongPress();
  }, false);
  document.addEventListener("touchcancel", clearCellLongPress, false);
  document.addEventListener("touchend", function(e) {
    lastTouchAt = Date.now();
    if (cellLongPress) {
      if (!cellLongPress.fired) clearCellLongPress();
      else return;
    }
    handleAppTap(e);
  }, false);
  document.addEventListener("click", function(e) {
    if (Date.now() - lastTouchAt < 700) return;
    handleAppTap(e);
  }, false);
  document.addEventListener("change", function(e) {
    var t = e.target;
    if (!t || !t.getAttribute) return;
    if (t.getAttribute("data-set-rule")) setRule(t.getAttribute("data-set-rule"), t.value);
    else if (t.getAttribute("data-rename-player")) renamePlayer(t.getAttribute("data-rename-player"), t.value);
    else if (t.getAttribute("data-player-active")) setPlayerActive(t.getAttribute("data-player-active"), t.value === "1");
    else if (t.getAttribute("data-annual-best-player") != null) {
      setAnnualBestAward(t.value);
    }
    else if (t.getAttribute("data-annual-special-slot") != null && t.getAttribute("data-annual-special-field")) {
      setAnnualSpecialAwardSlot(t.getAttribute("data-annual-special-slot"), t.getAttribute("data-annual-special-field"), t.value);
    }
    else if (t.getAttribute("data-roster-id") && t.getAttribute("data-roster-field")) {
      var rosterField = t.getAttribute("data-roster-field");
      if (rosterField === "memberComment" || rosterField === "personalGoal") return;
      updateRosterMember(t.getAttribute("data-roster-id"), rosterField, t.value);
    }
    else if (t.id === "rosterLeaguePick") render();
    else if (t.getAttribute("data-special-slot") != null && t.getAttribute("data-special-field")) {
      setSpecialAwardSlot(t.getAttribute("data-special-slot"), t.getAttribute("data-special-field"), t.value);
    }
  }, false);
  var memberLoginInput = document.getElementById("memberLoginInput");
  var memberLoginForm = document.getElementById("memberLoginForm");
  var memberLoginComposing = false;
  if (memberLoginInput) {
    memberLoginInput.addEventListener("compositionstart", function() { memberLoginComposing = true; }, false);
    memberLoginInput.addEventListener("compositionend", function() { memberLoginComposing = false; }, false);
    memberLoginInput.addEventListener("keydown", function(e) {
      if (memberLoginComposing || e.isComposing || e.keyCode === 229) return;
      if (e.key === "Enter" || e.keyCode === 13) {
        e.preventDefault();
        submitMemberLogin();
      }
    }, false);
  }
  if (memberLoginForm) {
    memberLoginForm.addEventListener("submit", function(e) {
      e.preventDefault();
      submitMemberLogin();
    }, false);
  }
  document.addEventListener("input", function(e) {
    var t = e.target;
    if (!t || !t.getAttribute) return;
    if (t.id === "feedbackSearchInput") {
      feedbackSearchQuery = t.value || "";
      flushFeedbackInputsFromDom();
      render();
      var fbSearch = document.getElementById("feedbackSearchInput");
      if (fbSearch) {
        fbSearch.focus();
        try {
          var len = fbSearch.value.length;
          fbSearch.setSelectionRange(len, len);
        } catch (focusErr) {}
      }
      return;
    }
    if (!t.getAttribute("data-roster-id")) return;
    var field = t.getAttribute("data-roster-field");
    if (field !== "sposuruName" && field !== "name") return;
    var m = findRosterMember(t.getAttribute("data-roster-id"));
    if (!m) return;
    if (field === "sposuruName") m.sposuruName = t.value || "";
    else if (field === "memberComment") {
      m.memberComment = t.value || "";
      touchMemberCommentMeta(m);
    }
    else if (field === "name") {
      var nn = (t.value || "").trim();
      if (nn) m.name = nn;
    }
  }, false);
}

window.setView = setView;
window.selectLeague = selectLeague;
window.openCellModal = openCellModal;
window.closeModal = closeModal;
window.closePlayerModal = closePlayerModal;
window.closeStripeReview = closeStripeReview;
window.openPlayerHistory = openPlayerHistory;
window.modalSet = modalSet;
window.exportImage = exportImage;
window.exportPDF = exportPDF;

try {
  markLegacyIOS();
  bindAppEvents();
  var urlView = parseUrlViewParam();
  if (urlView === "feedback" && !isMemberMode) currentView = "feedback";
  render();
  window.addEventListener("resize", function() { fitGridColumns(); initLegacyGridScroll(); }, false);
  if (isMemberMode) {
    setTimeout(function() { initMemberCloud(); }, 50);
  } else {
    setTimeout(function() { initCloud(); }, 50);
  }
} catch (bootErr) {
  showBootError(bootErr.message || bootErr);
}

async function initMemberCloud() {
  if (!memberApiReady()) {
    render();
    showToast("WordPress 会員ページから開いてください", { type: "warn", duration: 5000 });
    return;
  }
  try {
    var cfg = getMemberApiConfig();
    var payload = await memberApiFetch("/data?token=" + encodeURIComponent(cfg.accessToken) + "&_t=" + Date.now());
    state = normalizeState(payload.data || {});
    viewingArchiveId = null;
    if (!getLeague(currentLeagueId)) currentLeagueId = state.leagues[0] ? state.leagues[0].id : null;
    var resolved = resolveMyRosterId();
    if (resolved) {
      try {
        var sess = await memberApiFetch("/member-session?token=" + encodeURIComponent(cfg.accessToken) +
          "&rosterId=" + encodeURIComponent(resolved) + "&_t=" + Date.now());
        mergeMemberIntoState(sess.member);
        activateMyRoster(sess.rosterId);
      } catch (sessErr) {
        myRosterId = "";
        clearMemberSessionRosterId();
        document.body.className = document.body.className.replace(/\s*has-my-roster/g, "");
      }
    } else {
      myRosterId = "";
      document.body.className = document.body.className.replace(/\s*has-my-roster/g, "");
    }
    updateMemberProgressUI();
    render();
    initMemberCloudRefresh();
  } catch (e) {
    showToast((e && e.message) ? e.message : "データ読込に失敗しました", { type: "error", duration: 5000 });
  }
}

function initMemberCloudRefresh() {
  if (!memberApiReady() || memberCloudRefreshBound) return;
  memberCloudRefreshBound = true;
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState !== "visible") return;
    initMemberCloud().catch(function() {});
  });
}

async function initCloud() {
  if (!ghReady()) { setSyncState("off"); return; }
  initCloudSyncLifecycle();
  setSyncState("syncing");
  try {
    const remote = await cloudPull();
    if (remote) {
      var merged = mergeCloudStates(state, remote);
      var changed = applyMergedCloudState(merged);
      if (changed) {
        await cloudPush();
      } else {
        setSyncState("synced", "読込 " + formatConfirmDate(Date.now()));
      }
    } else {
      await cloudPush();
    }
  } catch (e) {
    setSyncState("error", String(e.message || e));
  }
}
</script>
