<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a2744">
<title>米倉道場ポータル</title>
<style>
:root {
  --bg: #f4f6fb;
  --surface: #fff;
  --ink: #1a2744;
  --muted: #5c6b8a;
  --line: #d8e0ef;
  --accent: #c9a227;
  --accent2: #2d5a8e;
  --header-from: #1a2744;
  --header-to: #2d4a7a;
  --header-col: #2d4a7a;
  --panel: #eef2f9;
  --panel-light: #f0f4fa;
  --panel-border: #c8d8ef;
  --j1-bg: #dce8f8;
  --j1-bg-light: #e8f0fa;
  --win: #1e7a4a;
  --win-bg: #e8f6ee;
  --lose: #b83232;
  --lose-bg: #fdeeee;
  --draw: #8a6d1a;
  --draw-bg: #fff8e6;
  --empty: #eef2f9;
  --empty-bg: #fafbfd;
  --empty-border: transparent;
  --empty-text: #c5ced9;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);

  /* 流体スケール（calc + vw）— 320px〜1200px で滑らかに変化 */
  --fluid-base: calc(14px + 0.35vw);
  --fluid-text-2xs: calc(10px + 0.12vw);
  --fluid-text-xs: calc(11px + 0.18vw);
  --fluid-text-sm: calc(12px + 0.24vw);
  --fluid-text-md: calc(14px + 0.32vw);
  --fluid-text-lg: calc(16px + 0.42vw);
  --fluid-text-xl: calc(18px + 0.52vw);
  --fluid-text-2xl: calc(22px + 0.62vw);
  --fluid-text-3xl: calc(26px + 0.72vw);
  --fluid-space-2xs: calc(2px + 0.1vw);
  --fluid-space-xs: calc(4px + 0.2vw);
  --fluid-space-sm: calc(6px + 0.35vw);
  --fluid-space-md: calc(10px + 0.5vw);
  --fluid-space-lg: calc(14px + 0.65vw);
  --fluid-space-xl: calc(18px + 0.85vw);
  --fluid-pad-inline: calc(10px + 1.25vw);
  --fluid-pad-block: calc(10px + 0.75vw);
  --fluid-gap: calc(6px + 0.4vw);
  --fluid-gap-lg: calc(10px + 0.55vw);
  --fluid-touch: calc(40px + 0.75vw);
  --fluid-radius-sm: calc(6px + 0.15vw);
  --fluid-radius-md: calc(10px + 0.25vw);
  --fluid-radius-lg: calc(14px + 0.35vw);
  --fluid-content-max: min(calc(280px + 52vw), 920px);
  --fluid-content-max-instructor: min(calc(280px + 88vw), 1440px);
  --fluid-main-bottom: calc(56px + 2.5vw + var(--safe-b));
  --fluid-rank-col: calc(28px + 1.2vw);
  --fluid-stat-min: calc(36px + 1.5vw);
  --fluid-tab-min: calc(5.5em + 0.5vw);
  --fluid-input: calc(15px + 0.25vw);
  --fluid-line: 1.55;
  --fluid-line-tight: 1.35;
  --fluid-line-loose: 1.7;
  /* 星取表：名前・列見出し（--grid-*-scale は fitGridColumns が調整） */
  --grid-name-font: calc(13px + 0.24vw);
  --grid-head-font: calc(11px + 0.18vw);
}
body.member-mode {
  --bg: #f0ede8;
  --surface: #fff;
  --ink: #3a342e;
  --muted: #766e65;
  --line: #d4cdc4;
  --accent: #b8956a;
  --accent2: #6d5a45;
  --header-from: #4a3f35;
  --header-to: #6b5d4f;
  --header-col: #5c5046;
  --panel: #ebe6df;
  --panel-light: #f5f1eb;
  --panel-border: #d4cdc4;
  --j1-bg: #e8e0d4;
  --j1-bg-light: #f0ebe4;
  --empty: #ebe6df;
  --empty-bg: #f8f6f3;
  --empty-text: #c4bbb0;
  --gold: #d4a820;
  --silver: #b8b0a8;
  --bronze: #a67c3d;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: var(--fluid-base); -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
  font-size: 1rem;
  background: var(--bg);
  color: var(--ink);
  line-height: var(--fluid-line);
  padding-bottom: var(--fluid-main-bottom);
}
header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, var(--header-from) 0%, var(--header-to) 100%);
  color: #fff;
  padding: calc(var(--fluid-space-sm) + var(--safe-t)) var(--fluid-pad-inline) var(--fluid-space-sm);
  box-shadow: 0 2px 12px rgba(0,0,0,.18);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--fluid-gap);
}
.header-title-block {
  flex: 1;
  min-width: 0;
}
header h1 {
  font-size: var(--fluid-text-xl); font-weight: 700; letter-spacing: .02em; line-height: var(--fluid-line-tight);
  word-break: break-word;
}
header .sub {
  font-size: var(--fluid-text-sm); opacity: .75; margin-top: var(--fluid-space-2xs);
  line-height: var(--fluid-line); word-break: break-word;
}
.header-actions {
  display: flex;
  gap: var(--fluid-space-sm);
  flex-wrap: wrap;
  justify-content: flex-end;
  flex: 0 0 auto;
  max-width: calc(52% + 2vw);
  margin-top: 0;
}
.header-meta {
  margin-top: var(--fluid-space-sm);
}
.header-meta .sub,
.header-meta .sync-status {
  display: block;
  max-width: 100%;
  word-break: break-word;
  line-height: 1.45;
}
.header-actions .btn-master.active {
  background: rgba(255,255,255,.22);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
}
body.member-mode #btnMyProgress.active {
  background: rgba(255,255,255,.22);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.35);
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--fluid-space-xs);
  border: none; border-radius: var(--fluid-radius-md); padding: var(--fluid-space-sm) var(--fluid-space-md);
  font-size: var(--fluid-text-md); font-weight: 600; cursor: pointer;
  min-height: var(--fluid-touch);
  transition: transform .08s, opacity .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  -webkit-appearance: none; appearance: none;
}
.btn:active { transform: scale(.96); }
.btn-sm { padding: var(--fluid-space-sm) var(--fluid-space-md); font-size: var(--fluid-text-sm); border-radius: var(--fluid-radius-sm); min-height: calc(var(--fluid-touch) - 4px); }
.btn-primary { background: var(--accent); color: var(--ink); }
.btn-secondary { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); }
.btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--line); }
.btn-danger { background: #fdeeee; color: var(--lose); border: 1px solid #f5c6c6; }
.btn-win { background: var(--win-bg); color: var(--win); border: 1px solid #b8e0c8; }
.btn-draw { background: var(--draw-bg); color: var(--draw); border: 1px solid #f0dfa0; }
.btn-lose { background: var(--lose-bg); color: var(--lose); border: 1px solid #f5c6c6; }
.btn-block { width: 100%; }
.league-tabs {
  display: flex; gap: var(--fluid-space-sm); padding: var(--fluid-space-md) var(--fluid-pad-inline) 0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.league-tabs::-webkit-scrollbar { display: none; }
.league-tab {
  flex: 0 0 auto; padding: var(--fluid-space-sm) var(--fluid-space-lg); border-radius: calc(20px + 0.5vw);
  font-size: var(--fluid-text-md); font-weight: 600; cursor: pointer;
  background: var(--surface); color: var(--muted);
  border: 1.5px solid var(--line); white-space: nowrap;
  min-height: var(--fluid-touch);
  transition: all .15s;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none; appearance: none; font-family: inherit;
}
.league-tab.active {
  background: var(--ink); color: #fff; border-color: var(--ink);
}
.view-tabs {
  display: flex; margin: var(--fluid-space-md) var(--fluid-pad-inline) 0; background: var(--surface);
  border-radius: var(--fluid-radius-md); padding: calc(var(--fluid-space-2xs) + 1px); border: 1px solid var(--line);
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  flex-wrap: nowrap; max-width: calc(100% - var(--fluid-pad-inline) * 2);
}
.view-tabs::-webkit-scrollbar { display: none; }
.view-tab {
  flex: 0 0 auto; text-align: center; padding: var(--fluid-space-sm) var(--fluid-space-sm);
  border-radius: calc(var(--fluid-radius-sm) + 2px);
  font-size: var(--fluid-text-sm); font-weight: 600; cursor: pointer; color: var(--muted);
  background: transparent; border: none;
  min-width: var(--fluid-tab-min); min-height: var(--fluid-touch);
  line-height: var(--fluid-line-tight);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none; appearance: none; font-family: inherit;
}
.view-tab.active { background: var(--ink); color: #fff; }
main {
  padding: var(--fluid-pad-block) var(--fluid-pad-inline) var(--fluid-space-xl);
  max-width: var(--fluid-content-max);
  margin-left: auto;
  margin-right: auto;
}
body:not(.member-mode):not(.embedded) main {
  max-width: var(--fluid-content-max-instructor);
}
.card {
  background: var(--surface); border-radius: var(--fluid-radius-lg);
  border: 1px solid var(--line); padding: var(--fluid-space-lg);
  margin-bottom: var(--fluid-space-md); box-shadow: 0 1px 4px rgba(26,39,68,.06);
}
.card-title {
  font-size: var(--fluid-text-md); font-weight: 700; color: var(--muted);
  margin-bottom: var(--fluid-space-md); display: flex; align-items: center; gap: var(--fluid-space-sm);
  flex-wrap: wrap; line-height: var(--fluid-line-tight); word-break: break-word;
}
.card-title::before {
  content: ""; display: inline-block; width: 3px; height: calc(12px + 0.4vw);
  background: var(--accent); border-radius: 2px;
}
.standings { display: flex; flex-direction: column; gap: var(--fluid-space-sm); }
.standing-row {
  display: grid;
  grid-template-columns: var(--fluid-rank-col) minmax(0, 1fr) auto;
  align-items: center; gap: var(--fluid-space-sm) var(--fluid-gap); padding: var(--fluid-space-sm) var(--fluid-space-md);
  border-radius: var(--fluid-radius-md); background: var(--bg);
}
.standing-row > :nth-child(2) { min-width: 0; }
.standing-stats-col {
  display: flex;
  align-items: center;
  gap: var(--fluid-gap);
  flex-shrink: 0;
}
.standing-stat {
  text-align: center;
  min-width: var(--fluid-stat-min);
  flex-shrink: 0;
}
.standing-row.top1 { background: linear-gradient(90deg, #fff9e0, var(--bg)); border-left: 3px solid var(--gold); }
.standing-row.top2 { border-left: 3px solid var(--silver); }
.standing-row.top3 { border-left: 3px solid var(--bronze); }
.rank-badge {
  width: calc(24px + 0.5vw); height: calc(24px + 0.5vw); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fluid-text-sm); font-weight: 800; background: var(--line); color: var(--muted);
}
.top1 .rank-badge { background: var(--gold); color: #5a4a00; }
.top2 .rank-badge { background: var(--silver); color: #444; }
.top3 .rank-badge { background: var(--bronze); color: #fff; }
.standing-row.j1-zone:not(.top1):not(.top2):not(.top3) {
  background: linear-gradient(90deg, var(--j1-bg), var(--bg));
  border-left: 4px solid var(--accent2);
}
.standing-row.j1-zone-tie:not(.top1):not(.top2):not(.top3) {
  background: linear-gradient(90deg, #fff3cc, var(--bg));
  border-left: 4px solid var(--accent);
}
.standing-row.j1-zone:not(.top1):not(.top2):not(.top3) .rank-badge { background: var(--accent2); color: #fff; }
.standing-row.j1-zone-tie:not(.top1):not(.top2):not(.top3) .rank-badge { background: var(--accent); color: var(--ink); }
.stripe-visual {
  display: inline-flex; align-items: center; gap: 3px;
  margin-left: 6px; padding: 3px 7px; border-radius: 5px;
  background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
  border: 1px solid #444; vertical-align: middle; flex-shrink: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
}
.stripe-visual-sm { margin-left: 4px; padding: 2px 5px; gap: 2px; border-radius: 4px; }
.stripe-bar {
  display: block; width: 7px; height: 14px; border-radius: 2px;
  background: linear-gradient(180deg, #ffe566 0%, #ffd700 45%, #c9a227 100%);
  box-shadow: 0 0 0 0.5px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35);
}
.stripe-bar-sm { width: 5px; height: 11px; }
.stripe-more {
  font-size: var(--fluid-text-2xs); font-weight: 800; color: #ffd700; line-height: 1;
  padding-left: var(--fluid-space-2xs); letter-spacing: -.02em;
}
.stripe-visual-sm .stripe-more { font-size: calc(9px + 0.1vw); }
.player-name-line {
  display: inline-flex; align-items: center; flex-wrap: wrap; gap: 4px 6px;
  max-width: 100%;
}
.player-name-line .player-tap { flex: 0 1 auto; }
.player-name-line .stripe-visual,
.player-name-line .stripe-visual-sm { margin-left: 0; }
.unplayed-count {
  font-size: var(--fluid-text-lg); font-weight: 800; min-width: calc(24px + 0.5vw); text-align: center;
  color: var(--accent2);
}
.unplayed-count.zero { color: var(--win); font-size: var(--fluid-text-md); }
.grid-table .remain-col {
  background: var(--panel-light); font-weight: 800; font-size: var(--fluid-text-sm);
  position: -webkit-sticky; position: sticky; z-index: 2; pointer-events: none;
  right: calc(68px + 0.8vw); min-width: calc(28px + 0.5vw); color: var(--muted);
}
.grid-table .remain-col.remain-zero { color: var(--win); }
.grid-table thead .remain-col {
  background: var(--header-col); color: #fff; writing-mode: horizontal-tb; height: auto; z-index: 3;
}
.grid-table tbody tr.j1-row .remain-col { background: var(--j1-bg-light); }
.grid-table tbody tr.j1-row-tie .remain-col { background: #fff8e0; }
.j1-cutoff-banner {
  padding: var(--fluid-space-md) var(--fluid-space-lg); margin-bottom: var(--fluid-space-md); border-radius: var(--fluid-radius-md);
  background: linear-gradient(135deg, var(--panel-light), var(--surface)); border: 1px solid var(--panel-border);
  font-size: var(--fluid-text-sm); line-height: var(--fluid-line);
}
.j1-cutoff-banner strong { color: var(--accent2); }
.j1-cutoff-note { display: block; margin-top: var(--fluid-space-xs); color: var(--muted); font-size: var(--fluid-text-sm); }
.grid-subtitle {
  font-size: var(--fluid-text-sm); font-weight: 500; color: var(--muted);
  margin: calc(var(--fluid-space-xs) * -1) 0 var(--fluid-space-md); line-height: var(--fluid-line-loose);
}
.grid-subtitle-item { display: block; }
@media (min-width: 768px) {
  .grid-subtitle-item { display: inline; }
  .grid-subtitle-item + .grid-subtitle-item::before { content: " · "; }
}
.playoff-desc { font-size: var(--fluid-text-sm); color: var(--muted); margin: calc(var(--fluid-space-xs) * -1) 0 var(--fluid-space-md); }
.playoff-empty { font-size: var(--fluid-text-sm); color: var(--muted); padding: var(--fluid-space-sm) 0; }
.playoff-participants { display: flex; flex-wrap: wrap; gap: var(--fluid-space-sm); margin-bottom: var(--fluid-space-md); }
.playoff-pill {
  display: inline-flex; align-items: center; gap: var(--fluid-space-xs);
  padding: var(--fluid-space-xs) var(--fluid-space-md); border-radius: calc(18px + 0.5vw); font-size: var(--fluid-text-sm); font-weight: 600;
  background: var(--bg); border: 1px solid var(--line);
}
.playoff-side-tag {
  font-size: var(--fluid-text-2xs); font-weight: 700; padding: 1px var(--fluid-space-xs); border-radius: var(--fluid-radius-sm);
  background: var(--accent2); color: #fff;
}
.awards-league-card { margin-bottom: var(--fluid-space-lg); }
.awards-dojo-card {
  margin-bottom: 18px; border: 2px solid #d4a820;
  background: linear-gradient(180deg, #fffef8 0%, var(--card) 48px);
}
.awards-dojo-card > .card-title { color: #8a6a00; }
.awards-section-block { margin-bottom: 14px; }
.awards-section-block:last-child { margin-bottom: 0; }
.award-item.award-annual-special { background: linear-gradient(135deg, #f5f0ff, var(--bg)); border-color: #c8b8e8; }
.awards-section-title {
  font-size: var(--fluid-text-sm); font-weight: 700; color: var(--muted);
  margin: var(--fluid-space-md) 0 var(--fluid-space-sm); padding-bottom: var(--fluid-space-xs); border-bottom: 1px solid var(--line);
}
.awards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(calc(140px + 8vw), 1fr)); gap: var(--fluid-gap); }
.awards-grid-single { grid-template-columns: 1fr; max-width: calc(320px + 5vw); }
.award-item {
  padding: var(--fluid-space-md) var(--fluid-space-lg); background: var(--bg); border-radius: var(--fluid-radius-md);
  border: 1px solid var(--line);
}
.award-item.award-mvp { background: linear-gradient(135deg, #fff9e0, var(--bg)); border-color: #e8d080; }
.award-item.award-annual-best { background: linear-gradient(135deg, #fff4cc, #fffef5); border-color: #d4a820; box-shadow: 0 1px 4px rgba(180,140,20,.12); }
.award-item.award-monthly { background: linear-gradient(135deg, var(--panel-light), var(--bg)); border-color: var(--panel-border); }
.award-head { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.award-icon { font-size: var(--fluid-text-lg); line-height: 1; flex-shrink: 0; }
.award-label { font-size: var(--fluid-text-sm); font-weight: 700; color: var(--muted); line-height: var(--fluid-line-tight); word-break: break-word; }
.award-winner { font-size: var(--fluid-text-md); font-weight: 800; line-height: var(--fluid-line); word-break: break-word; overflow-wrap: anywhere; }
.award-winner .player-name-line { display: inline-flex; vertical-align: middle; }
.award-winner .player-name-line .player-tap { font-size: inherit; font-weight: inherit; padding: 0; }
.award-meta { font-size: var(--fluid-text-2xs); color: var(--muted); margin-top: var(--fluid-space-2xs); line-height: var(--fluid-line); }
.award-item.award-special { background: linear-gradient(135deg, #f0fff4, var(--bg)); border-color: #b8e0c8; }
.award-item.award-placeholder { opacity: .92; }
.award-item.award-placeholder .award-winner { color: var(--muted); font-weight: 600; font-size: var(--fluid-text-sm); }
.awards-member-banner {
  padding: var(--fluid-space-md) var(--fluid-space-lg); margin-bottom: var(--fluid-space-md); border-radius: var(--fluid-radius-md);
  background: linear-gradient(135deg, var(--panel-light), var(--surface)); border: 1px solid var(--panel-border);
  font-size: var(--fluid-text-sm); line-height: var(--fluid-line); color: var(--ink);
}
.awards-member-banner strong { color: var(--accent2); }
.awards-note {
  font-size: var(--fluid-text-2xs); color: var(--muted); line-height: var(--fluid-line-loose);
  margin-top: var(--fluid-space-sm); padding: var(--fluid-space-sm) var(--fluid-space-md); background: var(--bg); border-radius: var(--fluid-radius-sm);
}
.awards-filter-card {
  margin-bottom: var(--fluid-space-md); padding: var(--fluid-space-md);
}
.awards-filter-row {
  display: flex; flex-wrap: wrap; gap: var(--fluid-space-sm); align-items: center; margin-bottom: var(--fluid-space-sm);
}
.awards-filter-row:last-child { margin-bottom: 0; }
.awards-filter-label {
  font-size: var(--fluid-text-2xs); font-weight: 700; color: var(--muted);
  min-width: calc(38px + 0.5vw); flex-shrink: 0;
}
.awards-filter-btns { display: flex; flex-wrap: wrap; gap: var(--fluid-space-sm); flex: 1; }
.awards-filter-btn {
  padding: var(--fluid-space-sm) var(--fluid-space-md); border-radius: var(--fluid-radius-sm); border: 1px solid var(--line);
  background: var(--bg); font-size: var(--fluid-text-sm); font-weight: 700; color: var(--ink);
  cursor: pointer; font-family: inherit; min-height: calc(var(--fluid-touch) - 4px);
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  -webkit-appearance: none; appearance: none;
}
.awards-filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.awards-filter-btn.disabled, .awards-filter-btn:disabled {
  opacity: .38; cursor: not-allowed;
}
.awards-archive-note {

function resolveMyRosterId() {
  var fromSession = loadMemberSessionRosterId();
  if (fromSession && findRosterMember(fromSession)) return fromSession;
  return "";

function getAwardsCtx() {
  return awardsPageCtx || getActiveContext();
}

function collectAwardsPeriodIndex() {
  var years = {};
  function add(fy, sk) {
    if (!fy || !sk) return;
    if (!years[fy]) years[fy] = {};
    years[fy][sk] = true;
  }
  add(state.fiscalYear, state.seasonKey);
  (state.archives || []).forEach(function(a) {
    add(a.fiscalYear, a.seasonKey);
  });
  return years;
}

function resolveAwardsPageContext(fy, sk) {
  if (state.fiscalYear === fy && state.seasonKey === sk) {
    return {
      live: true,
      readonly: false,
      fiscalYear: fy,
      seasonKey: sk,
      seasonLabel: formatSeasonLabel(fy, sk),
      leagues: state.leagues || [],
      specialAwards: state.specialAwards || {},
      annualBestAward: state.annualBestAward || { playerId: "" },
      annualSpecialAwards: state.annualSpecialAwards || [],
      monthlyMvpLocked: state.monthlyMvpLocked || {},
      awardConfirmations: state.awardConfirmations || []
    };
  }
  var best = null;
  (state.archives || []).forEach(function(a) {
    if (a.fiscalYear !== fy || a.seasonKey !== sk) return;
    if (!best || (a.archivedAt || 0) > (best.archivedAt || 0)) best = a;
  });
  if (!best) return null;
  return {
    live: false,
    readonly: true,
    fiscalYear: fy,
    seasonKey: sk,
    seasonLabel: formatSeasonLabel(fy, sk),
    leagues: best.leagues || [],
    specialAwards: best.specialAwards || {},
    annualBestAward: best.annualBestAward || { playerId: "" },
    annualSpecialAwards: best.annualSpecialAwards || [],
    monthlyMvpLocked: best.monthlyMvpLocked || {},
    awardConfirmations: best.awardConfirmations || []
  };
}

const AWARDS_DEFAULT_LEAGUE_ID = "pre";

function getDefaultAwardsScope(ctx) {
  if (!ctx || !ctx.leagues || !ctx.leagues.length) return "dojo";
  var i;
  for (i = 0; i < ctx.leagues.length; i++) {
    if (ctx.leagues[i].id === AWARDS_DEFAULT_LEAGUE_ID) return AWARDS_DEFAULT_LEAGUE_ID;
  }
  return ctx.leagues[0].id;
}

function ensureAwardsViewFilters() {
  if (!awardsViewYear) awardsViewYear = state.fiscalYear;
  if (!awardsViewSeason) awardsViewSeason = state.seasonKey;
  if (!awardsViewScope) awardsViewScope = AWARDS_DEFAULT_LEAGUE_ID;
  var index = collectAwardsPeriodIndex();
  if (!index[awardsViewYear]) {
    awardsViewYear = state.fiscalYear;
    awardsViewSeason = state.seasonKey;
  }
  if (!index[awardsViewYear] || !index[awardsViewYear][awardsViewSeason]) {
    var si;
    for (si = 0; si < SEASON_DEFS.length; si++) {
      if (index[awardsViewYear] && index[awardsViewYear][SEASON_DEFS[si].key]) {
        awardsViewSeason = SEASON_DEFS[si].key;
        break;
      }
    }
  }
  syncAwardsViewScopeToContext();
}

function setAwardsYear(fy) {
  if (!fy || fy === awardsViewYear) return;
  awardsViewYear = fy;
  var index = collectAwardsPeriodIndex();
  if (!index[fy] || !index[fy][awardsViewSeason]) {
    var si;
    for (si = 0; si < SEASON_DEFS.length; si++) {
      if (index[fy] && index[fy][SEASON_DEFS[si].key]) {
        awardsViewSeason = SEASON_DEFS[si].key;
        break;
      }
    }
  }
  syncAwardsViewScopeToContext();
  render();
}

function setAwardsSeason(sk) {
  if (!sk || sk === awardsViewSeason) return;
  var index = collectAwardsPeriodIndex();
  if (!index[awardsViewYear] || !index[awardsViewYear][sk]) return;
  awardsViewSeason = sk;
  syncAwardsViewScopeToContext();
  render();
}

function setAwardsScope(scope) {
  if (!scope || scope === awardsViewScope) return;
  awardsViewScope = scope;
  render();
}

function syncAwardsViewScopeToContext() {
  var ctx = resolveAwardsPageContext(awardsViewYear, awardsViewSeason);
  if (!ctx) {
    awardsViewScope = AWARDS_DEFAULT_LEAGUE_ID;
    return;
  }
  if (awardsViewScope === "dojo") return;
  var found = false;
  (ctx.leagues || []).forEach(function(l) {
    if (l.id === awardsViewScope) found = true;
  });
  if (!found) awardsViewScope = getDefaultAwardsScope(ctx);
}

function renderAwardsFilterTabs(periodIndex) {
  var years = Object.keys(periodIndex).sort(function(a, b) { return parseInt(b, 10) - parseInt(a, 10); });
  var yearBtns = years.map(function(fy) {
    return '<button type="button" class="awards-filter-btn' + (fy === awardsViewYear ? " active" : "") +
      '" data-action="setAwardsYear" data-awards-year="' + esc(fy) + '">' + esc(fy) + "年度</button>";
  }).join("");
  var seasons = periodIndex[awardsViewYear] || {};
  var seasonBtns = SEASON_DEFS.map(function(def) {
    var has = !!seasons[def.key];
    var cls = "awards-filter-btn" + (def.key === awardsViewSeason ? " active" : "") + (has ? "" : " disabled");
    return '<button type="button" class="' + cls + '"' + (has ? "" : " disabled") +
      ' data-action="setAwardsSeason" data-awards-season="' + def.key + '">' + def.emoji + esc(def.label) + "</button>";
  }).join("");
  var ctx = resolveAwardsPageContext(awardsViewYear, awardsViewSeason);
  var leagues = ctx ? (ctx.leagues || []) : (state.leagues || []);
  var scopeBtns = '<button type="button" class="awards-filter-btn' + (awardsViewScope === "dojo" ? " active" : "") +
    '" data-action="setAwardsScope" data-awards-scope="dojo">🏛 道場</button>' +
    leagues.map(function(l) {
      return '<button type="button" class="awards-filter-btn' + (awardsViewScope === l.id ? " active" : "") +
        '" data-action="setAwardsScope" data-awards-scope="' + esc(l.id) + '">' + esc(l.name) + "</button>";
    }).join("");
  return '<div class="card awards-filter-card">' +
    '<div class="awards-filter-row"><span class="awards-filter-label">年度</span><div class="awards-filter-btns">' + yearBtns + "</div></div>" +
    '<div class="awards-filter-row"><span class="awards-filter-label">シーズン</span><div class="awards-filter-btns">' + seasonBtns + "</div></div>" +
    '<div class="awards-filter-row"><span class="awards-filter-label">表示</span><div class="awards-filter-btns">' + scopeBtns + "</div></div>" +
    "</div>";
}

const MEMBER_SESSION_KEY = "yonekura-jleague-member-session";

function getMemberApiConfig() {
  var search = window.location.search || "";
  var params = {};
  var i, part, kv;
  if (search.charAt(0) === "?") search = search.slice(1);
  if (search) {
    part = search.split("&");
    for (i = 0; i < part.length; i++) {
      kv = part[i].split("=");
      if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1] || "").replace(/\+/g, " "));
    }
  }
  var apiBase = (params.api || "").replace(/\/$/, "");
  return { apiBase: apiBase, accessToken: params.token || "" };
}

function memberApiReady() {
  var cfg = getMemberApiConfig();
  return !!(cfg.apiBase && cfg.accessToken);
}

async function memberApiFetch(path, options) {
  var cfg = getMemberApiConfig();
  if (!cfg.apiBase || !cfg.accessToken) {
    throw new Error("会員APIが未設定です");
  }
  options = options || {};
  var url = cfg.apiBase + path;
  var headers = options.headers || {};
  if (!headers["Content-Type"] && options.body) headers["Content-Type"] = "application/json";
  var res = await fetch(url, {
    method: options.method || "GET",
    headers: headers,
    body: options.body || null
  });
  var data = null;
  try { data = await res.json(); } catch (e) { data = null; }
  if (!res.ok || !data) {
    throw new Error((data && data.message) ? data.message : ("通信エラー (" + res.status + ")"));
  }
  if (data.ok === false) {
    throw new Error(data.message || "エラーが発生しました");
  }
  return data;
}

function mergeMemberIntoState(member) {
  if (!member || !member.id) return;
  if (!state.roster) state.roster = [];
  var idx = -1;
  for (var i = 0; i < state.roster.length; i++) {
    if (state.roster[i].id === member.id) { idx = i; break; }
  }
  if (idx >= 0) state.roster[idx] = member;
  else state.roster.push(member);
}

}

function normalizeBirthMd(raw) {
  var s = String(raw || "").replace(/[^\d]/g, "");
  if (s.length !== 4) return "";
  var month = parseInt(s.slice(0, 2), 10);
  var day = parseInt(s.slice(2, 4), 10);
  if (month < 1 || month > 12 || day < 1 || day > 31) return "";
  return String(month).padStart(2, "0") + String(day).padStart(2, "0");
}

function formatBirthMdDisplay(birthMd) {
  var md = normalizeBirthMd(birthMd);
  if (!md) return "";
  return parseInt(md.slice(0, 2), 10) + "/" + parseInt(md.slice(2, 4), 10);
}

function parseMemberLoginInput(raw) {
  var s = normalizeMemberLoginRaw(raw);
  if (!s) return null;
  var m = s.match(/^(.+?)(\d{4})$/);
  if (!m) return null;
  var birthMd = normalizeBirthMd(m[2]);
  if (!birthMd) return null;
  return { name: m[1], birthMd: birthMd };
}

function normalizeMemberLoginRaw(raw) {
  return String(raw || "").trim().replace(/\s+/g, "").replace(/[０-９]/g, function(c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
  });
}

function findRosterByMemberLogin(name, birthMd) {
  var targetName = (name || "").trim();
  var targetMd = normalizeBirthMd(birthMd);
  if (!targetName || !targetMd) return null;
  var roster = getRosterList();
  var i, m;
  for (i = 0; i < roster.length; i++) {
    m = roster[i];
    if ((m.name || "").trim() === targetName && normalizeBirthMd(m.birthMd) === targetMd) return m;
  }
  return null;
}

function loadMemberSessionRosterId() {
  try { return sessionStorage.getItem(MEMBER_SESSION_KEY) || ""; } catch (e) { return ""; }
}

function saveMemberSessionRosterId(rosterId) {
  try { sessionStorage.setItem(MEMBER_SESSION_KEY, rosterId); } catch (e) {}
}

function clearMemberSessionRosterId() {
  try { sessionStorage.removeItem(MEMBER_SESSION_KEY); } catch (e) {}
}

function syncSeniorMemberUI() {
  document.body.className = document.body.className.replace(/\s*senior-member/g, "");
  if (myRosterId) {
    var m = findRosterMember(myRosterId);
    if (m && isSeniorMember(m)) document.body.className += " senior-member";
  }
}

function getMemberProgressButtonLabel() {
  if (myRosterId) {
    var m = findRosterMember(myRosterId);
    if (m && isSeniorMember(m)) return "🎯 マイ目標";
  }
  return "🎗 マイ進捗";
}

  myRosterId = rosterId;

  var input = document.getElementById("memberLoginInput");
  if (!input) return;
  setTimeout(function() {
    try {
      input.focus({ preventScroll: true });
    } catch (e) {
      input.focus();
    }
    try {
      var len = input.value.length;
      input.setSelectionRange(len, len);
    } catch (selErr) {}
  }, 280);
}

  } catch (e) {

var _embedResizeTimer = null;
var _embedResizePaused = false;
var _lastEmbedReportedH = 0;

function measureEmbedDocumentHeight() {
  var body = document.body;
  if (!body) return 0;
  var sum = 0;
  var nodes = document.querySelectorAll("header, .league-tabs, .view-tabs, main");
  var i, node;
  for (i = 0; i < nodes.length; i++) {
    node = nodes[i];
    if (!node) continue;
    sum += node.offsetHeight;
  }
  var cs = window.getComputedStyle(body);
  sum += parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  sum += parseFloat(cs.marginTop) + parseFloat(cs.marginBottom);
  if (sum < 80) {
    var doc = document.documentElement;
    sum = Math.max(
      doc ? doc.offsetHeight : 0,
      body.offsetHeight || 0
    );
  }
  return Math.ceil(Math.min(sum, 8000));
}

function notifyEmbedResize() {
  if (!detectEmbedded() || _embedResizePaused) return;
  try {
    var h = measureEmbedDocumentHeight();
    if (h > 0 && Math.abs(h - _lastEmbedReportedH) <= 1) return;
    _lastEmbedReportedH = h;
    window.parent.postMessage({ type: "yonekura-portal-resize", height: h }, "*");
  } catch (e) { /* ignore */ }
}
function scheduleEmbedResize() {
  if (!detectEmbedded()) return;
  if (_embedResizeTimer) clearTimeout(_embedResizeTimer);
  _embedResizeTimer = setTimeout(notifyEmbedResize, 60);
}
var _embedLayoutPending = false;
function runEmbedLayoutNotify() {
  if (_embedLayoutPending) return;
  _embedLayoutPending = true;
  requestAnimationFrame(function() {
    _embedLayoutPending = false;
    fitGridColumns();
    initLegacyGridScroll();
    scheduleEmbedResize();
  });
}
function initEmbedResize() {
  if (!detectEmbedded()) return;
  var notify = runEmbedLayoutNotify;
  window.addEventListener("resize", notify, false);
  window.addEventListener("orientationchange", function() {
    setTimeout(notify, 120);
    setTimeout(notify, 400);
  }, false);
  if (typeof ResizeObserver !== "undefined") {
    try {
      var roTarget = document.querySelector("main") || document.body;
      var ro = new ResizeObserver(scheduleEmbedResize);
      if (roTarget) ro.observe(roTarget);
    } catch (e) { /* ignore */ }
  }
  setTimeout(notify, 0);
  setTimeout(notify, 350);
  setTimeout(notify, 1200);
}

const SEASON_DEFS = [
  { key: "spring", label: "春シーズン", emoji: "🌸", months: "4月〜6月（第1回入れ替え戦・6月末）" },
  { key: "summer", label: "夏シーズン", emoji: "☀️", months: "7月〜9月（第2回入れ替え戦・9月末）" },
  { key: "autumn", label: "秋シーズン", emoji: "🍁", months: "10月〜12月（第3回入れ替え戦・12月末）" },
  { key: "winter", label: "冬シーズン", emoji: "❄️", months: "1月〜3月（最終入れ替え戦・3月末）" }
];

function detectSeasonKey(date) {
  var m = (date || new Date()).getMonth() + 1;
  if (m >= 4 && m <= 6) return "spring";
  if (m >= 7 && m <= 9) return "summer";
  if (m >= 10 && m <= 12) return "autumn";
  return "winter";
}

function getSeasonDef(key) {
  for (var i = 0; i < SEASON_DEFS.length; i++) {
    if (SEASON_DEFS[i].key === key) return SEASON_DEFS[i];
  }
  return SEASON_DEFS[0];
}

function formatSeasonLabel(fiscalYear, seasonKey) {
  var def = getSeasonDef(seasonKey);
  return fiscalYear + "年度 " + def.emoji + def.label;
}

function getFiscalYearForDate(date) {
  var d = date || new Date();
  var m = d.getMonth() + 1;
  var y = d.getFullYear();
  return m >= 4 ? String(y) : String(y - 1);
}

function getPeriodKeyForDate(date) {
  var d = date || new Date();
  return getFiscalYearForDate(d) + "-" + detectSeasonKey(d);
}

function getCurrentPeriodKey() {
  if (isReadonly()) {
    var ctx = getActiveContext();
    return ctx.seasonSlug || "";
  }
  return state.seasonId || (state.fiscalYear + "-" + state.seasonKey);
}

function formatSeasonLabelFromPeriodKey(periodKey) {
  if (!periodKey) return "";
  var dash = periodKey.indexOf("-");
  if (dash < 0) return periodKey;
  return formatSeasonLabel(periodKey.slice(0, dash), periodKey.slice(dash + 1));
}

var STRIPE_CAT_LABELS = { shin: "心", gi: "技", tai: "体", safety: "安全", prereq: "受験資格" };

function resolveCheckItemLabel(targetLevel, checkKey) {
  if (!checkKey) return "";
  var def = getStripeLevelDef(targetLevel);
  if (!def) return "";
  var parts = checkKey.split("-");
  var catKey = parts[0];
  var idx = parseInt(parts[1], 10);
  if (isNaN(idx)) return "";
  var groups = getStripeCheckGroups(def);
  var gi;
  for (gi = 0; gi < groups.length; gi++) {
    if (groups[gi].key === catKey && groups[gi].items[idx]) {
      return groups[gi].items[idx].label;
    }
  }
  return "";
}

function getReviewsForPeriod(member, periodKey) {
  periodKey = periodKey || getCurrentPeriodKey();
  return (member.reviews || []).filter(function(r) {
    var pk = r.periodKey || (r.at ? getPeriodKeyForDate(new Date(r.at)) : "");
    return pk === periodKey;
  });
}

function analyzeReviewsForDraft(member, periodKey) {
  var reviews = getReviewsForPeriod(member, periodKey).filter(isStripeReviewEntry).slice().sort(function(a, b) {
    return (a.at || 0) - (b.at || 0);
  });
  if (!reviews.length) return null;
  var okByCat = {};
  var ngItems = [];
  var memos = [];
  var ri, r, k, val, label, cat;
  for (ri = 0; ri < reviews.length; ri++) {
    r = reviews[ri];
    if (r.memo && String(r.memo).trim()) memos.push(String(r.memo).trim());
    if (!r.checks) continue;
    for (k in r.checks) {
      if (!Object.prototype.hasOwnProperty.call(r.checks, k)) continue;
      val = r.checks[k];
      label = resolveCheckItemLabel(r.targetLevel || 1, k);
      if (!label) continue;
      cat = k.split("-")[0];
      if (val === "ok") {
        if (!okByCat[cat]) okByCat[cat] = [];
        if (okByCat[cat].indexOf(label) < 0) okByCat[cat].push(label);
      } else if (val === "ng" && ngItems.indexOf(label) < 0) {
        ngItems.push(label);
      }
    }
  }
  return {
    reviews: reviews,
    latest: reviews[reviews.length - 1],
    okByCat: okByCat,
    ngItems: ngItems,
    memos: memos
  };
}

function pickStrengthPhrase(okByCat) {
  var order = ["shin", "gi", "tai", "safety"];
  var phrases = [];
  var i, cat, items, catLabel;
  for (i = 0; i < order.length; i++) {
    cat = order[i];
    items = okByCat[cat];
    if (!items || !items.length) continue;
    catLabel = STRIPE_CAT_LABELS[cat] || cat;
    if (cat === "shin") phrases.push("礼法や集中力（" + catLabel + "）");
    else if (cat === "gi") phrases.push("「" + items[0] + "」（" + catLabel + "）");
    else if (cat === "tai") phrases.push("体力づくり（" + catLabel + "）");
    else if (cat === "safety") phrases.push("安全面（" + catLabel + "）");
  }
  if (phrases.length >= 2) return phrases.slice(0, 2).join("と") + "が定着してきています";
  if (phrases.length === 1) return phrases[0] + "が伸びています";
  return "";
}

function generateMemberCommentDraft(member, periodKey) {
  periodKey = periodKey || getCurrentPeriodKey();
  var analysis = analyzeReviewsForDraft(member, periodKey);
  if (!analysis) return "";
  var parts = [];
  var latest = analysis.latest;
  if (latest.result === "pass") {
    parts.push((latest.targetLevel || "") + "本目のストライプ、おめでとうございます！");
  } else {
    parts.push("今シーズンも稽古に取り組みました。あと一歩です。");
  }
  var strength = pickStrengthPhrase(analysis.okByCat);
  if (strength) parts.push(strength + "。");
  if (analysis.ngItems.length) {
    parts.push("次は「" + analysis.ngItems.slice(0, 2).join("」「") + "」を意識してみましょう。");
  }
  if (analysis.memos.length) {
    var uniqueMemos = [];
    var mi;
    for (mi = 0; mi < analysis.memos.length; mi++) {
      if (uniqueMemos.indexOf(analysis.memos[mi]) < 0) uniqueMemos.push(analysis.memos[mi]);
    }
    parts.push(uniqueMemos.slice(-2).join("／"));
  }
  return "【" + formatSeasonLabelFromPeriodKey(periodKey) + "】\n" + parts.join("\n");
}

function b64Encode(str) {
  if (typeof TextEncoder !== "undefined") {
    var bytes = new TextEncoder().encode(str);
    var bin = "";
    var step = 0x8000;
    for (var i = 0; i < bytes.length; i += step) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + step));
    }
    return btoa(bin);
  }
  return btoa(unescape(encodeURIComponent(str)));
}

/* ===== クラウド競合 — フィールド単位マージ（updatedAt だけに頼らない） ===== */
function resultPlayedAt(r) {
  return (r && r.playedAt) ? r.playedAt : 0;
}

function mergeMatchResults(localResults, remoteResults) {
  localResults = localResults || {};
  remoteResults = remoteResults || {};
  var merged = deepClone(remoteResults);
  Object.keys(localResults).forEach(function(key) {
    var lr = localResults[key];
    var rr = merged[key];
    if (!lr) return;
    if (!rr) {
      merged[key] = deepClone(lr);
      return;
    }
    var lt = resultPlayedAt(lr);
    var rt = resultPlayedAt(rr);
    if (lt > rt) merged[key] = deepClone(lr);
    else if (rt > lt) merged[key] = deepClone(rr);
    else if (JSON.stringify(lr) !== JSON.stringify(rr)) merged[key] = deepClone(lt >= rt ? lr : rr);
  });
  return merged;
}

function mergeReviewLists(a, b) {
  var map = {};
  (a || []).concat(b || []).forEach(function(r) {
    if (!r) return;
    var id = r.id || ("rev-" + (r.at || 0) + "-" + (r.kind || "") + "-" + String(r.body || r.message || "").slice(0, 24));
    var prev = map[id];
    if (!prev || (r.at || 0) >= (prev.at || 0)) map[id] = deepClone(r);
  });
  return Object.keys(map).map(function(k) { return map[k]; }).sort(function(x, y) { return (x.at || 0) - (y.at || 0); });
}

function memberMetaTime(m) {
  var meta = (m && m.memberCommentMeta) || {};
  return meta.updatedAt || meta.generatedAt || 0;
}

function mergeRosterMember(local, remote) {
  if (!local) return deepClone(remote);
  if (!remote) return deepClone(local);
  var localTime = memberMetaTime(local);
  var remoteTime = memberMetaTime(remote);
  var out = deepClone(localTime >= remoteTime ? local : remote);
  var other = localTime >= remoteTime ? remote : local;
  out.stripes = Math.max(parseInt(local.stripes, 10) || 0, parseInt(remote.stripes, 10) || 0);
  var localAtt = local.attendanceCount || 0;
  var remoteAtt = remote.attendanceCount || 0;
  out.attendanceCount = Math.max(localAtt, remoteAtt);
  if (localAtt > remoteAtt) out.attendanceUpdatedAt = local.attendanceUpdatedAt || 0;
  else if (remoteAtt > localAtt) out.attendanceUpdatedAt = remote.attendanceUpdatedAt || 0;
  else out.attendanceUpdatedAt = Math.max(local.attendanceUpdatedAt || 0, remote.attendanceUpdatedAt || 0);
  out.reviews = mergeReviewLists(local.reviews, remote.reviews);
  if (memberMetaTime(other) > memberMetaTime(out)) {
    out.memberComment = other.memberComment;
    out.memberCommentMeta = deepClone(other.memberCommentMeta);
  }
  var lGoalAt = local.personalGoalPeriodKey || "";
  var rGoalAt = remote.personalGoalPeriodKey || "";
  if ((local.personalGoal || "") && (!remote.personalGoal || lGoalAt >= rGoalAt)) {
    out.personalGoal = local.personalGoal;
    out.personalGoalPeriodKey = local.personalGoalPeriodKey;
  } else if (remote.personalGoal) {
    out.personalGoal = remote.personalGoal;
    out.personalGoalPeriodKey = remote.personalGoalPeriodKey;
  }
  ["name", "group", "sposuruName", "birthMd", "track", "enrolledAt"].forEach(function(key) {
    if (!out[key] && other[key]) out[key] = other[key];
  });
  return out;
}

function mergeLeaguesInto(target, source) {
  if (!source || !source.leagues) return;
  if (!target.leagues) target.leagues = [];
  source.leagues.forEach(function(sl) {
    var tl = null;
    for (var i = 0; i < target.leagues.length; i++) {
      if (target.leagues[i].id === sl.id) { tl = target.leagues[i]; break; }
    }
    if (!tl) {
      target.leagues.push(deepClone(sl));
      return;
    }
    tl.results = mergeMatchResults(tl.results, sl.results);
    (sl.players || []).forEach(function(sp) {
      var tp = null;
      for (var j = 0; j < (tl.players || []).length; j++) {
        if (tl.players[j].id === sp.id) { tp = tl.players[j]; break; }
      }
      if (!tp) {
        if (!tl.players) tl.players = [];
        tl.players.push(deepClone(sp));
        return;
      }
      if (!tp.name && sp.name) tp.name = sp.name;
      tp.active = (tp.active !== false) || (sp.active !== false);
    });
  });
}

function mergePlayoffsInto(target, source) {
  if (!source || !source.playoffs) return;
  if (!target.playoffs) target.playoffs = {};
  ["pre_j1", "j1_j2"].forEach(function(key) {
    var sp = source.playoffs[key];
    if (!sp) return;
    if (!target.playoffs[key]) target.playoffs[key] = { results: {} };
    target.playoffs[key].results = mergeMatchResults(
      (target.playoffs[key] && target.playoffs[key].results) || {},
      sp.results || {}
    );
  });
}

function mergeRosterInto(target, source) {
  if (!source || !source.roster) return;
  if (!target.roster) target.roster = [];
  source.roster.forEach(function(sm) {
    var tm = null;
    var idx = -1;
    for (var i = 0; i < target.roster.length; i++) {
      if (target.roster[i].id === sm.id) { tm = target.roster[i]; idx = i; break; }
    }
    if (!tm) {
      target.roster.push(deepClone(sm));
      return;
    }
    target.roster[idx] = mergeRosterMember(tm, sm);
  });
}

function mergeArchivesInto(target, source) {
  if (!source || !source.archives) return;
  if (!target.archives) target.archives = [];
  source.archives.forEach(function(sa) {
    var found = false;
    for (var i = 0; i < target.archives.length; i++) {
      if (target.archives[i].id === sa.id) {
        found = true;
        if ((sa.archivedAt || 0) > (target.archives[i].archivedAt || 0)) target.archives[i] = deepClone(sa);
        break;
      }
    }
    if (!found) target.archives.unshift(deepClone(sa));
  });
}

function mergeSposuruSettingsInto(target, source) {
  if (!source || !source.sposuruSettings) return;
  ensureSposuruSettings(target);
  ensureSposuruSettings(source);
  var td = target.sposuruSettings;
  var sd = source.sposuruSettings;
  td.importedSessions = Object.assign({}, sd.importedSessions || {}, td.importedSessions || {});
  var baselines = Object.assign({}, sd.importBaselines || {});
  Object.keys(td.importBaselines || {}).forEach(function(k) {
    baselines[k] = Math.max(baselines[k] || 0, td.importBaselines[k] || 0);
  });
  td.importBaselines = baselines;
  if ((sd.lastSyncAt || 0) > (td.lastSyncAt || 0)) {
    td.lastSyncAt = sd.lastSyncAt;
    td.lastSyncSummary = sd.lastSyncSummary;
    td.lastImportCutoffDate = sd.lastImportCutoffDate;
  }
}

function mergeCloudStates(local, remote) {
  local = normalizeState(local || {});
  remote = normalizeState(remote || {});
  var localNewer = (local.updatedAt || 0) >= (remote.updatedAt || 0);
  var merged = deepClone(localNewer ? local : remote);
  var secondary = localNewer ? remote : local;
  mergeLeaguesInto(merged, secondary);
  mergePlayoffsInto(merged, secondary);
  mergeRosterInto(merged, secondary);
  mergeArchivesInto(merged, secondary);
  mergeSposuruSettingsInto(merged, secondary);
  merged.updatedAt = Math.max(local.updatedAt || 0, remote.updatedAt || 0, Date.now());
  return normalizeState(merged);
}

function applyMergedCloudState(merged, opts) {
  opts = opts || {};
  var prev = normalizeState(state);
  merged = normalizeState(merged);
  var changed = JSON.stringify(merged) !== JSON.stringify(prev);
  state = merged;
  viewingArchiveId = null;
  if (!getLeague(currentLeagueId)) currentLeagueId = state.leagues[0] ? state.leagues[0].id : null;
  saveLocal();
  render();
  if (opts.toast && changed) {
    showToast(opts.toast, { type: opts.toastType || "ok", duration: opts.toastDuration || 3500 });
  }
  return changed;
}

function formatGhError(msg) {
  var s = String(msg || "");
  if (/Maximum call stack|InvalidCharacterError|encoding/i.test(s)) return "データ量が多いためエンコードに失敗しました。ページを再読み込みして再保存してください";
  if (/Failed to fetch|NetworkError|Load failed|network/i.test(s)) return "ネットワークエラーです。通信を確認して再試行してください";
  if (/401|Bad credentials/i.test(s)) return "GitHubトークンが無効または期限切れです。📋マスターで再入力してください";
  if (/403/.test(s)) return "トークンの権限不足です（リポジトリの Contents: Read and write が必要）";
  if (/404/.test(s)) return "同期先ファイルが見つかりません（repo / path を確認）";
  if (/409/.test(s)) return "他端末と競合しました（自動統合を試みます）";
  if (/422/.test(s)) return "GitHubへの送信形式エラーです。ページを再読み込みして再保存してください";
  return s.length > 120 ? s.slice(0, 120) + "…" : s;
}

function setSyncState(s, msg) { ghSyncState = s; ghLastMsg = msg || ""; updateSyncBadge(); updateGhStatusLine(); }

    : (ghLastMsg || label);
}

async function ghGetSha() {
  const res = await fetch(ghApiUrl() + "?ref=" + encodeURIComponent(ghCfg.branch) + "&t=" + Date.now(), { headers: ghHeaders() });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error("GET " + res.status);
  return (await res.json()).sha;
}

async function cloudPull() {
  const res = await fetch(ghApiUrl() + "?ref=" + encodeURIComponent(ghCfg.branch) + "&t=" + Date.now(), { headers: ghHeaders() });
  if (res.status === 404) { ghSha = null; return null; }
  if (!res.ok) throw new Error("GET " + res.status);
  const j = await res.json();
  ghSha = j.sha;
  return JSON.parse(b64Decode(j.content));
}

async function cloudPush() {
  if (!ghReady()) { setSyncState("off"); return false; }
  if (ghPushInFlight) return ghPushInFlight;
  setSyncState("syncing");
  ghPushInFlight = (async function() {
    try {
      if (ghSha === null) { try { ghSha = await ghGetSha(); } catch (e) {} }
      var encoded = "";
      try {
        encoded = b64Encode(stateJsonForCloud());
      } catch (encErr) {
        throw new Error("encode " + (encErr && encErr.message ? encErr.message : encErr));
      }
      const body = {
        message: `データ更新 (${new Date().toISOString()})`,
        content: encoded,
        branch: ghCfg.branch
      };
      if (ghSha) body.sha = ghSha;
      const opts = () => ({ method: "PUT", headers: Object.assign({ "Content-Type": "application/json" }, ghHeaders()), body: JSON.stringify(body) });
      let res = await fetch(ghApiUrl(), opts());
      var mergedOn409 = false;
      if (res.status === 409) {
        var remote409 = null;
        try { remote409 = await cloudPull(); } catch (pullErr) { remote409 = null; }
        if (remote409) {
          var merged409 = mergeCloudStates(state, remote409);
          applyMergedCloudState(merged409);
          mergedOn409 = true;
          ghSha = await ghGetSha();
          body.content = b64Encode(stateJsonForCloud());
          if (ghSha) body.sha = ghSha; else delete body.sha;
          res = await fetch(ghApiUrl(), opts());
        } else {
          ghSha = await ghGetSha();
          body.content = b64Encode(stateJsonForCloud());
          if (ghSha) body.sha = ghSha; else delete body.sha;
          res = await fetch(ghApiUrl(), opts());
        }
      }
      if (!res.ok) { const t = await res.text(); throw new Error("PUT " + res.status + " " + t.slice(0, 140)); }
      const j = await res.json();
      ghSha = (j.content && j.content.sha) ? j.content.sha : ghSha;
      setSyncState("synced", "保存 " + formatConfirmDate(Date.now()));
      if (mergedOn409) showToast("端末間のデータを統合して保存しました", { type: "ok", duration: 3500 });
      return true;
    } catch (e) {
      setSyncState("error", String(e.message || e));
      return false;
    } finally {
      ghPushInFlight = null;
    }
  })();
  return ghPushInFlight;
}

async function testGhToken() {
  const res = await fetch(ghApiUrl() + "?ref=" + encodeURIComponent(ghCfg.branch) + "&t=" + Date.now(), { headers: ghHeaders() });
  if (res.status === 401) throw new Error("GET 401 Bad credentials");
  if (res.status === 403) throw new Error("GET 403");
  if (!res.ok) throw new Error("GET " + res.status);
  return true;
}

function schedulePush(immediate) {
  if (!ghReady()) { setSyncState("off"); return Promise.resolve(false); }
  if (ghPushTimer) clearTimeout(ghPushTimer);
  setSyncState("syncing");
  if (immediate) {
    ghPushTimer = null;
    return cloudPush();
  }
  return new Promise(function(resolve) {
    ghPushTimer = setTimeout(function() {
      ghPushTimer = null;
      cloudPush().then(resolve);
    }, 400);
  });
}

function flushPendingPush() {
  if (!ghReady()) return Promise.resolve(false);
  if (ghPushTimer) {
    clearTimeout(ghPushTimer);
    ghPushTimer = null;
    return cloudPush();
  }
  if (ghPushInFlight) return ghPushInFlight;
  return Promise.resolve(true);
}

function hasPendingCloudPush() {
  return !!(ghPushTimer || ghPushInFlight);
}

async function cloudPullIfNewer(silent) {
  if (!ghReady() || isMemberMode) return false;
  if (ghPullInFlight) return ghPullInFlight;
  ghPullInFlight = (async function() {
    try {
      const remote = await cloudPull();
      if (!remote) return false;
      var merged = mergeCloudStates(state, remote);
      var changed = applyMergedCloudState(merged);
      if (changed) {
        setSyncState("synced", "統合 " + formatConfirmDate(Date.now()));
        if (!silent) showToast("クラウドと端末のデータを統合しました", { type: "ok", duration: 2500 });
        schedulePush(true);
        return true;
      }
      var remoteT = remote.updatedAt || 0;
      var localT = state.updatedAt || 0;
      if (remoteT > localT) {
        setSyncState("synced", "読込 " + formatConfirmDate(Date.now()));
        if (!silent) showToast("クラウドの最新データを反映しました", { type: "ok", duration: 2500 });
        return true;
      }
      return false;
    } catch (e) {
      if (!silent) setSyncState("error", String(e.message || e));
      return false;
    } finally {
      ghPullInFlight = null;
    }
  })();
  return ghPullInFlight;
}

function initCloudSyncLifecycle() {
  if (isMemberMode) return;
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "hidden") {
      if (ghPushTimer) flushPendingPush();
      return;
    }
    if (document.visibilityState === "visible" && ghReady() && !ghPushInFlight) {
      cloudPullIfNewer(true);
    }
  });
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

function normalizeState(raw) {
  var s = deepClone(raw);
  if (!s.leagues || !Array.isArray(s.leagues)) s.leagues = [];
  s.leagues.forEach(function(league) {
    if (!Array.isArray(league.players)) league.players = [];
    league.players.forEach(function(p) {
      if (typeof p.active !== "boolean") p.active = true;
      var sn = parseInt(p.stripes, 10);
      p.stripes = isNaN(sn) || sn < 0 ? 0 : Math.min(sn, STRIPE_MAX);
    });
    if (!league.results || typeof league.results !== "object") league.results = {};
  });
  if (!Array.isArray(s.archives)) s.archives = [];
  if (!s.season) s.season = String(new Date().getFullYear());
  if (!s.fiscalYear) s.fiscalYear = s.season;
  if (!s.seasonKey) s.seasonKey = detectSeasonKey(new Date());
  if (!s.seasonId) s.seasonId = s.fiscalYear + "-" + s.seasonKey;
  s.season = s.fiscalYear;
  if (!s.playoffs || typeof s.playoffs !== "object") s.playoffs = {};
  if (!s.playoffs.pre_j1 || typeof s.playoffs.pre_j1 !== "object") s.playoffs.pre_j1 = { results: {} };
  if (!s.playoffs.j1_j2 || typeof s.playoffs.j1_j2 !== "object") s.playoffs.j1_j2 = { results: {} };
  if (!s.playoffs.pre_j1.results || typeof s.playoffs.pre_j1.results !== "object") s.playoffs.pre_j1.results = {};
  if (!s.playoffs.j1_j2.results || typeof s.playoffs.j1_j2.results !== "object") s.playoffs.j1_j2.results = {};
  if (!s.specialAwards || typeof s.specialAwards !== "object") s.specialAwards = {};
  if (!s.annualBestAward || typeof s.annualBestAward !== "object") {
    var migratedBest = "";
    if (s.annualBestAwards && typeof s.annualBestAwards === "object") {
      var abKeys = Object.keys(s.annualBestAwards);
      for (var abi = 0; abi < abKeys.length; abi++) {
        var abEntry = s.annualBestAwards[abKeys[abi]];
        if (abEntry && abEntry.playerId) { migratedBest = abEntry.playerId; break; }
      }
    }
    s.annualBestAward = { playerId: migratedBest };
  } else if (!s.annualBestAward.playerId) {
    s.annualBestAward.playerId = "";
  }
  s.annualSpecialAwards = normalizeAnnualSpecialSlots(s.annualSpecialAwards);
  delete s.annualBestAwards;
  if (!s.monthlyMvpLocked || typeof s.monthlyMvpLocked !== "object") s.monthlyMvpLocked = {};
  if (!Array.isArray(s.awardConfirmations)) s.awardConfirmations = [];
  if (!Array.isArray(s.roster)) s.roster = [];
  ensureRosterLinks(s);
  ensureSposuruSettings(s);
  s.version = 4;
  return s;
}

}

function buildStripePrereqAttendanceLabelKid(member, targetLevel, attProgress) {

function getStripeCheckGroupsForMember(def, member, targetLevel, memberFacing) {
  var groups = getStripeCheckGroups(def);
  if (!member) return groups;
  var attendanceLabel = memberFacing
    ? buildStripePrereqAttendanceLabelKid(member, targetLevel)
    : buildStripePrereqAttendanceLabel(member, targetLevel);
  return groups.map(function(group) {
    if (group.key !== "prereq" || !attendanceLabel) return group;
    var attItem = { label: attendanceLabel, labelKid: attendanceLabel };
    return {
      key: group.key,
      label: group.label,
      labelKid: group.labelKid,
      required: group.required,
      items: [attItem].concat(group.items)
    };
  });
}

function getRosterList() {

}

function findRosterMember(rosterId) {
  if (!rosterId) return null;
  var list = getRosterList();
  var i;
  for (i = 0; i < list.length; i++) {
    if (list[i].id === rosterId) return list[i];
  }
  return null;
}

function normalizeRosterMember(raw) {
  var m = raw || {};
  var sn = parseInt(m.stripes, 10);
  var group = m.group || "";
  return {
    id: m.id || ("r-" + Date.now() + "-" + Math.floor(Math.random() * 1000)),
    name: m.name || "館員",
    sposuruName: m.sposuruName || "",
    group: group,
    track: inferMemberTrack(group, m.track),
    stripes: isNaN(sn) || sn < 0 ? 0 : Math.min(sn, STRIPE_MAX),
    birthMd: normalizeBirthMd(m.birthMd),
    enrolledAt: m.enrolledAt || "",
    attendanceCount: Math.max(0, parseInt(m.attendanceCount, 10) || 0),
    attendanceUpdatedAt: Math.max(0, parseInt(m.attendanceUpdatedAt, 10) || 0),
    memo: m.memo || "",
    personalGoal: m.personalGoal || "",
    personalGoalPeriodKey: m.personalGoalPeriodKey || "",
    memberComment: m.memberComment || "",
    memberCommentMeta: m.memberCommentMeta && typeof m.memberCommentMeta === "object" ? m.memberCommentMeta : null,
    reviews: Array.isArray(m.reviews) ? m.reviews.map(normalizeReviewEntry) : []
  };
}

function ensureRosterLinks(s) {
  if (!Array.isArray(s.roster)) s.roster = [];
  var i, j, league, p, m, byName = {}, byId = {};
  for (i = 0; i < s.roster.length; i++) {
    s.roster[i] = normalizeRosterMember(s.roster[i]);
    ensureMessageHistoryFromComment(s.roster[i]);
    byName[s.roster[i].name] = s.roster[i];
    byId[s.roster[i].id] = s.roster[i];
  }
  for (i = 0; i < s.leagues.length; i++) {
    league = s.leagues[i];
    for (j = 0; j < league.players.length; j++) {
      p = league.players[j];
      if (p.rosterId && byId[p.rosterId]) {
        m = byId[p.rosterId];
      } else if (byName[p.name]) {
        m = byName[p.name];
        p.rosterId = m.id;
      } else {
        continue;
      }
      var ps = parseInt(p.stripes, 10);
      if (!isNaN(ps) && ps > m.stripes) m.stripes = Math.min(ps, STRIPE_MAX);
      p.stripes = m.stripes;
    }
  }
}

function syncStripesFromRoster(rosterId) {
  if (!state || !state.leagues) return;
  var m = findRosterMember(rosterId);
  if (!m) return;
  state.leagues.forEach(function(league) {
    league.players.forEach(function(p) {
      if (p.rosterId === rosterId) p.stripes = m.stripes;
    });
  });
}

function syncAllStripesFromRoster() {
  (state.roster || []).forEach(function(m) { syncStripesFromRoster(m.id); });
}

function monthsSinceEnrolled(enrolledAt) {
  if (!enrolledAt) return null;
  var parts = enrolledAt.split("-");
  if (parts.length < 2) return null;
  var y = parseInt(parts[0], 10);
  var mo = parseInt(parts[1], 10) - 1;
  if (isNaN(y) || isNaN(mo)) return null;
  var start = new Date(y, mo, 1);
  var now = new Date();
  return (now.getFullYear() - start.getFullYear()) * 12 + (now.getMonth() - start.getMonth());
}

function getMemberLeagueLabels(rosterId) {

    });
  });
  return labels;
}

function getStripeLevelSummary(stripes, memberFacing) {

  if (!def) return { label: stripes + "本", theme: "", tagline: "" };

}

function formatStripeReviewResultLabel(result, memberFacing) {
  if (result === "pass") return memberFacing ? "もらえた！" : "合格";
  if (result === "retry") return memberFacing ? "もうすこし" : "保留";
  return memberFacing ? "もうすこし" : "保留";
}

function isStripeReviewEntry(r) {
  return !!r && r.kind !== "message";
}

function isMessageEntry(r) {
  return !!r && r.kind === "message";
}

function normalizeReviewEntry(r) {
  if (!r || typeof r !== "object") return r;
  if (r.kind === "message") return r;
  var out = Object.assign({}, r, { kind: r.kind || "review" });
  if (out.result === "pass" && out.attendanceAtPass != null) {
    out.attendanceAtPass = Math.max(0, parseInt(out.attendanceAtPass, 10) || 0);
  }
  return out;
}

function getLatestMessageEntry(member) {
  var reviews = (member.reviews || []).filter(isMessageEntry);
  reviews.sort(function(a, b) { return (b.at || 0) - (a.at || 0); });
  return reviews[0] || null;
}

function appendMemberMessageHistory(m, text, source) {
  text = (text || "").trim();
  if (!text) return false;
  var latest = getLatestMessageEntry(m);
  if (latest && String(latest.memo || "").trim() === text) return false;
  if (!m.reviews) m.reviews = [];
  m.reviews.push({
    id: "sr-" + Date.now() + "-" + Math.floor(Math.random() * 1000),
    at: Date.now(),
    periodKey: getCurrentPeriodKey(),
    kind: "message",
    memo: text,
    source: source || "manual"
  });
  return true;
}

function ensureMessageHistoryFromComment(m) {
  var text = (m.memberComment || "").trim();
  if (!text) return;
  if ((m.reviews || []).some(isMessageEntry)) return;
  var meta = m.memberCommentMeta || {};
  if (!m.reviews) m.reviews = [];
  m.reviews.push({
    id: "sr-mig-" + (meta.updatedAt || meta.generatedAt || Date.now()),
    at: meta.updatedAt || meta.generatedAt || Date.now(),
    periodKey: meta.periodKey || getCurrentPeriodKey(),
    kind: "message",
    memo: text,
    source: meta.source || "legacy"
  });
}

    (r.memo ? '<div class="stripe-history-body" style="color:var(--muted)">' + esc(r.memo) + "</div>" : "") +
    "</div>";
  if (!opts.deletable) return item;
  return '<div class="stripe-history-row">' + item +

    return isStripeReviewEntry(r) && r.result === "pass" && r.targetLevel === level;
  });
  reviews.sort(function(a, b) { return (b.at || 0) - (a.at || 0); });
  return reviews[0] || null;
}

function getStripeStandardSpan(targetLevel) {
  var def = getStripeLevelDef(targetLevel);
  if (!def) return 0;
  var prevDef = getStripeLevelDef(targetLevel - 1);
  return def.minAttendance - (prevDef ? prevDef.minAttendance : 0);
}

function getStripeAttendanceBaseline(member) {
  var stripes = member.stripes || 0;
  if (stripes <= 0) return 0;
  var passReview = getLatestPassReviewForLevel(member, stripes);
  if (passReview && passReview.attendanceAtPass != null) {
    return Math.max(0, parseInt(passReview.attendanceAtPass, 10) || 0);
  }
  var curDef = getStripeLevelDef(stripes);
  if (curDef) return curDef.minAttendance;
  return 0;
}

function getStripeAttendanceProgress(member, targetLevel) {
  var def = getStripeLevelDef(targetLevel);
  if (!def) return null;
  var current = member.attendanceCount || 0;
  var cumulativeRequired = def.minAttendance;
  var baseline = getStripeAttendanceBaseline(member);
  var span = Math.max(1, getStripeStandardSpan(targetLevel));
  var progress = Math.max(0, current - baseline);
  return {
    baseline: baseline,
    current: current,
    progress: progress,
    span: span,
    cumulativeRequired: cumulativeRequired,
    ok: progress >= span
  };
}

function buildStripeAttendanceInstructorNote(attProgress) {
  if (!attProgress) return "";
  return "累計目安 " + attProgress.cumulativeRequired + "回（参考・現在 " + attProgress.current + "回）";
}

function getLatestStripeReviewForLevel(member, targetLevel) {
  var reviews = (member.reviews || []).filter(function(r) {
    return isStripeReviewEntry(r) && r.targetLevel === targetLevel;
  });
  reviews.sort(function(a, b) { return (b.at || 0) - (a.at || 0); });
  return reviews[0] || null;
}

function loadStripeReviewChecksFromLatest(member, targetLevel) {
  stripeReviewChecks = {};
  var latest = getLatestStripeReviewForLevel(member, targetLevel);
  if (!latest || !latest.checks) return latest;
  var def = getStripeLevelDef(targetLevel);
  if (!def) return latest;
  var groups = getStripeCheckGroups(def), gi, ii, key, val;
  for (gi = 0; gi < groups.length; gi++) {
    for (ii = 0; ii < groups[gi].items.length; ii++) {
      key = groups[gi].key + "-" + ii;
      val = latest.checks[key];
      if (val === "ok" || val === "ng") stripeReviewChecks[key] = val;
    }
  }
  return latest;
}

function applyStripeReviewChecksToDom() {
  var k, dash, cat, idx, val;
  for (k in stripeReviewChecks) {
    if (!Object.prototype.hasOwnProperty.call(stripeReviewChecks, k)) continue;
    val = stripeReviewChecks[k];
    if (val !== "ok" && val !== "ng") continue;
    dash = k.lastIndexOf("-");
    if (dash < 0) continue;
    cat = k.substring(0, dash);
    idx = parseInt(k.substring(dash + 1), 10);
    if (isNaN(idx)) continue;
    setMarubatsu(cat, idx, val);
  }
}

function getLatestStripeReview(member) {
  var reviews = (member.reviews || []).filter(isStripeReviewEntry);
  reviews.sort(function(a, b) { return (b.at || 0) - (a.at || 0); });
  return reviews[0] || null;
}

function getNgItemsFromReview(review) {
  if (!review || !review.checks) return [];
  var ngItems = [], k, val, label;
  for (k in review.checks) {
    if (!Object.prototype.hasOwnProperty.call(review.checks, k)) continue;
    val = review.checks[k];
    if (val !== "ng") continue;
    label = resolveCheckItemLabel(review.targetLevel || 1, k);
    if (label && ngItems.indexOf(label) < 0) ngItems.push(label);
  }
  return ngItems;
}

function appendNgItemsToMessage(baseText, ngItems) {
  if (!ngItems || !ngItems.length) return baseText || "";
  var filtered = ngItems.filter(function(item) {
    return !baseText || baseText.indexOf(item) < 0;
  });
  if (!filtered.length) return baseText || "";
  var ngLine = "次に意識してほしいこと：\n" + filtered.map(function(item) { return "・" + item; }).join("\n");
  if (!baseText || !String(baseText).trim()) return ngLine;
  return String(baseText).trim() + "\n\n" + ngLine;
}

function touchMemberCommentMeta(m, forceManual) {
  if (!m.memberCommentMeta || typeof m.memberCommentMeta !== "object") m.memberCommentMeta = {};
  m.memberCommentMeta.updatedAt = Date.now();
  if (forceManual) m.memberCommentMeta.source = "manual";
  else if (m.memberCommentMeta.source === "auto-draft") m.memberCommentMeta.status = "edited";
  else if (!m.memberCommentMeta.source) m.memberCommentMeta.source = "manual";
}

function isManualMemberComment(member) {
  var meta = member.memberCommentMeta;
  if (!meta || typeof meta !== "object") return false;
  return meta.source === "manual" || meta.status === "edited" || !!meta.updatedAt;
}

function getInstructorMessageForMember(member) {
  var latestMsg = getLatestMessageEntry(member);
  if (latestMsg && (latestMsg.memo || "").trim()) {
    var msgText = String(latestMsg.memo).trim();
    var senior = isSeniorMember(member);
    var latestReview = senior ? null : getLatestStripeReview(member);
    var ngItems = senior ? [] : getNgItemsFromReview(latestReview);
    var text = appendNgItemsToMessage(msgText, ngItems);
    if (!text) return null;
    var at = latestMsg.at || 0;
    if (latestReview && (latestReview.at || 0) > at) at = latestReview.at;
    return { text: text, at: at || null, source: "message", ngItems: ngItems };
  }
  var comment = (member.memberComment || "").trim();
  var meta = member.memberCommentMeta || {};
  var commentAt = meta.updatedAt || meta.generatedAt || 0;
  var senior = isSeniorMember(member);
  var latestReview = senior ? null : getLatestStripeReview(member);
  var ngItems = senior ? [] : getNgItemsFromReview(latestReview);
  var manualComment = !!(comment && isManualMemberComment(member));
  var base = null;
  if (senior) {
    if (comment) base = { text: comment, at: commentAt || null, source: "comment" };
  } else {
    var latestReviewMemo = null;
    var i, r, memo;
    for (i = 0; i < (member.reviews || []).length; i++) {
      r = member.reviews[i];
      if (!isStripeReviewEntry(r)) continue;
      memo = r.memo && String(r.memo).trim();
      if (!memo) continue;
      if (!latestReviewMemo || (r.at || 0) > (latestReviewMemo.at || 0)) {
        latestReviewMemo = { text: memo, at: r.at || 0, source: "review" };
      }
    }
    if (manualComment) {
      base = { text: comment, at: commentAt, source: "comment" };
    } else if (latestReviewMemo && latestReviewMemo.at > commentAt) {
      base = latestReviewMemo;
    } else if (comment) {
      base = { text: comment, at: commentAt || null, source: "comment" };
    } else if (latestReviewMemo) {
      base = latestReviewMemo;
    }
  }
  if (!base && !ngItems.length) return null;
  var text = appendNgItemsToMessage(base ? base.text : "", ngItems);
  if (!text) return null;
  var at = base ? (base.at || 0) : 0;
  if (latestReview && (latestReview.at || 0) > at) at = latestReview.at;
  return { text: text, at: at || null, source: base ? base.source : "review", ngItems: ngItems };
}

        warnings.push(league.name + "（要ストライプ" + min + "本以上・現在" + stripes + "本）");

}

function checkStripeEligibility(member, targetLevel) {
  var def = getStripeLevelDef(targetLevel);
  if (!def) return { ok: false, reasons: ["審査定義がありません"] };
  var reasons = [];
  if ((member.stripes || 0) < def.prevStripes) {
    reasons.push("現在" + member.stripes + "本（" + def.prevStripes + "本以上が必要）");
  }
  var att = getStripeAttendanceProgress(member, targetLevel);
  if (att && !att.ok) {
    var remain = Math.max(0, att.span - att.progress);
    if ((member.stripes || 0) > 0) {
      reasons.push("前回合格から " + att.progress + " / " + att.span + "回（あと" + remain + "回）");
    } else {
      reasons.push("出席 " + att.current + " / " + att.span + "回（あと" + remain + "回）");
    }
  }
  return { ok: reasons.length === 0, reasons: reasons, def: def, attendance: att };
}

function updateRosterMember(rosterId, field, value) {
  if (isMemberMode || isReadonly()) return;
  var m = findRosterMember(rosterId);
  if (!m) return;
  if (field === "name") {
    var newName = (value || "").trim();
    if (!newName) return;
    m.name = newName;
    if (state.leagues) {
      state.leagues.forEach(function(league) {
        league.players.forEach(function(p) {
          if (p.rosterId === rosterId) p.name = newName;
        });
      });
    }

function detectSposuruColumns(headers) {

    else if (/^姓$/.test(h)) seiIdx = i;

}

function buildSposuruRowName(cells, cols) {

  var mei = cols.meiIdx >= 0 ? (cells[cols.meiIdx] || "").trim() : "";
  if (sei && mei) return sei + mei;
  if (sei && cols.nameIdx >= 0 && cells[cols.nameIdx]) return sei + (cells[cols.nameIdx] || "").trim();

}

function parseAttendanceValue(raw) {
  if (raw == null || raw === "") return null;
  var s = String(raw).trim();
  if (!s) return null;
  if (isPresentStatus(s)) return 1;
  var m = s.match(/(\d+)/);
  if (m) return parseInt(m[1], 10);
  return null;
}

function isPresentStatus(val) {
  var s = (val || "").trim();
  if (!s) return false;
  if (/欠席|欠|休|不在|absent|cancel|未/i.test(s)) return false;
  return /出席|◯|○|◎|present|参加|済|ok|到着|在籍|履歴/i.test(s) || s === "1";
}

function collectSposuruSessions(lines, start, delim, cols, cutoffDate) {
  var sessions = [], li, name, group, status, cells, rowDate, scheduledAt, title, dateCol, useDateFilter;
  dateCol = getSposuruScheduleColIdx(cols);
  useDateFilter = cols.scheduledAtIdx >= 0 && cutoffDate;
  for (li = start; li < lines.length; li++) {
    cells = parseCsvLine(lines[li], delim);
    group = cols.groupIdx >= 0 ? (cells[cols.groupIdx] || "").trim() : "";
    if (cols.groupIdx >= 0 && !isSposuruRosterGroup(group)) continue;
    name = buildSposuruRowName(cells, cols);
    if (!name) continue;
    if (cols.statusIdx >= 0) {
      status = cells[cols.statusIdx];
      if (!isPresentStatus(status)) continue;
    }
    scheduledAt = dateCol >= 0 ? (cells[dateCol] || "").trim() : "";
    rowDate = scheduledAt ? normalizeEnrolledDate(scheduledAt) : "";
    if (useDateFilter && rowDate && !isDateOnOrBefore(rowDate, cutoffDate)) continue;
    title = cols.titleIdx >= 0 ? (cells[cols.titleIdx] || "").trim() : "";
    if (cols.titleIdx >= 0 && isSposuruAttendanceGroup(group) && !isSposuruImportTitle(title)) continue;
    sessions.push({
      name: name,
      group: group,
      scheduledAt: scheduledAt,
      rowDate: rowDate,
      title: title,
      sessionKey: cols.scheduledAtIdx >= 0
        ? buildSposuruSessionKey(name, group, scheduledAt, title)
        : buildSposuruSessionKey(name, group, "log", String(li)),
      enrolledAt: cols.enrolledIdx >= 0 ? normalizeEnrolledDate(cells[cols.enrolledIdx]) : ""

  }

}

function sessionsToCountRows(sessions) {
  var counts = {}, groups = {}, enrolled = {}, i, s;
  for (i = 0; i < sessions.length; i++) {
    s = sessions[i];
    counts[s.name] = (counts[s.name] || 0) + 1;
    if (s.group) groups[s.name] = s.group;
    if (s.enrolledAt && (!enrolled[s.name] || s.enrolledAt < enrolled[s.name])) enrolled[s.name] = s.enrolledAt;
  }
  return Object.keys(counts).map(function(n) {
    return { name: n, attendance: counts[n], enrolledAt: enrolled[n] || "", group: groups[n] || "" };
  });
}

function findEarliestSessionDate(sessions) {
  var earliest = "", i, d;
  for (i = 0; i < sessions.length; i++) {
    d = sessions[i].rowDate;
    if (d && (!earliest || d < earliest)) earliest = d;
  }
  return earliest;
}

function emptySposuruParseResult() {

}

function mergeSposuruRows(rows) {
  var map = {}, i, r, key;
  for (i = 0; i < rows.length; i++) {
    r = rows[i];
    key = r.name;
    if (!map[key]) map[key] = { name: r.name, attendance: null, enrolledAt: "", group: "" };
    if (r.attendance != null) {
      map[key].attendance = map[key].attendance == null ? r.attendance : Math.max(map[key].attendance, r.attendance);
    }
    if (r.enrolledAt && (!map[key].enrolledAt || r.enrolledAt < map[key].enrolledAt)) map[key].enrolledAt = r.enrolledAt;
    if (r.group && !map[key].group) map[key].group = r.group;
  }
  return Object.keys(map).map(function(k) { return map[k]; });
}

function parseSposuruCsv(text, options) {
  options = options || {};
  var cutoffDate = options.importCutoffDate !== undefined ? options.importCutoffDate : getTodayDateStr();
  var lines = (text || "").replace(/^\uFEFF/, "").split(/\r?\n/).filter(function(line) { return line.trim(); });
  if (!lines.length) return emptySposuruParseResult();
  var delim = lines[0].indexOf("\t") >= 0 ? "\t" : ",";
  var headers = parseCsvLine(lines[0], delim);
  var cols = detectSposuruColumns(headers);
  var hasHeader = /氏名|姓名|名前|会員|メンバー|出席|入館|出欠|姓|名|attendance|グループ|出欠予定|確認/i.test(headers.join(" "));
  var start = hasHeader ? 1 : 0;
  if (!hasHeader) cols = { nameIdx: 0, attIdx: 1, enrolledIdx: 2, statusIdx: -1, seiIdx: -1, meiIdx: -1, groupIdx: -1, dateIdx: -1, scheduledAtIdx: -1, titleIdx: -1 };

  if (cols.statusIdx >= 0) {
    var useSessionMode = cols.scheduledAtIdx >= 0;
    var sessions = collectSposuruSessions(lines, start, delim, cols, useSessionMode ? cutoffDate : null);
    if (sessions.length) {
      return {
        sessions: sessions,
        rows: sessionsToCountRows(sessions),
        format: useSessionMode ? "session" : "log",
        stats: {}
      };
    }
    if (useSessionMode) {
      var allPresent = collectSposuruSessions(lines, start, delim, cols, null);
      if (allPresent.length) {
        return {
          sessions: [],
          rows: [],
          format: "session",
          stats: { futureOnly: true, earliestDate: findEarliestSessionDate(allPresent), totalPresent: allPresent.length }
        };
      }
    }
    sessions = collectSposuruSessions(lines, start, delim, {
      nameIdx: cols.nameIdx, attIdx: cols.attIdx, enrolledIdx: cols.enrolledIdx, statusIdx: -1,
      seiIdx: cols.seiIdx, meiIdx: cols.meiIdx, groupIdx: cols.groupIdx, dateIdx: cols.dateIdx,
      scheduledAtIdx: cols.scheduledAtIdx, titleIdx: cols.titleIdx
    }, null);
    if (sessions.length) {
      return { sessions: sessions, rows: sessionsToCountRows(sessions), format: "log", stats: {} };
    }
  }

  var rows = [], li, attRaw, att, cells, rowDate;
  for (li = start; li < lines.length; li++) {
    cells = parseCsvLine(lines[li], delim);
    if (cols.groupIdx >= 0 && !isSposuruRosterGroup((cells[cols.groupIdx] || "").trim())) continue;
    rowDate = "";
    if (getSposuruScheduleColIdx(cols) >= 0 && cutoffDate) {

    }
    var rowName = buildSposuruRowName(cells, cols);

      name: rowName,
      attendance: att,

  }

}

function parseMemberListCsv(text) {
  var lines = (text || "").replace(/^\uFEFF/, "").split(/\r?\n/).filter(function(line) { return line.trim(); });
  if (!lines.length) return [];
  var delim = lines[0].indexOf("\t") >= 0 ? "\t" : ",";
  var headers = parseCsvLine(lines[0], delim);
  var nameIdx = -1, groupIdx = -1, birthIdx = -1, i, h;
  for (i = 0; i < headers.length; i++) {
    h = (headers[i] || "").trim();
    if (nameIdx < 0 && /会員氏名|氏名/i.test(h)) nameIdx = i;
    else if (groupIdx < 0 && /^グループ$/.test(h)) groupIdx = i;
    else if (birthIdx < 0 && /生年月日/.test(h)) birthIdx = i;
  }
  if (nameIdx < 0) return [];
  var rows = [], li, cells, name, group, birthMd;
  for (li = 1; li < lines.length; li++) {
    cells = parseCsvLine(lines[li], delim);
    name = (cells[nameIdx] || "").trim();
    group = groupIdx >= 0 ? (cells[groupIdx] || "").trim() : "";
    if (!name) continue;
    if (group !== "中学生" && group !== "高校生以上") continue;
    birthMd = birthIdx >= 0 ? birthDateToMd(cells[birthIdx]) : "";

function applyMemberListCsv(text) {
  if (isMemberMode || isReadonly()) return;
  flushRosterInputsFromDom();

  if (!rows.length) {
    showToast("中学生・高校生以上の行がありません（会員一覧CSVを確認）", { type: "warn" });
    return;
  }
  var created = 0, updated = 0, i, row, m, found;
  for (i = 0; i < rows.length; i++) {
    row = rows[i];
    found = findRosterForSposuruName(row.sposuruName);
    if (!found) {
      m = normalizeRosterMember({
        id: "r-senior-" + Date.now() + "-" + i,
        name: guessDojoNameFromSposuru(row.sposuruName),
        sposuruName: row.sposuruName,
        group: row.group,
        track: "senior",
        birthMd: row.birthMd,
        stripes: 0
      });
      if (!state.roster) state.roster = [];
      state.roster.push(m);
      created++;
    } else {
      m = found;
      if (row.group) m.group = row.group;
      m.track = "senior";
      if (row.birthMd) m.birthMd = row.birthMd;
      if (!m.sposuruName) m.sposuruName = row.sposuruName;
      updated++;
    }
  }
  saveState();
  render();
  showToast("会員一覧からシニア " + (created + updated) + "名を反映（新規" + created + "） ✓", { type: "ok" });
}
